<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  
  <link rel="apple-touch-icon" href="https://i.ibb.co/kV9gcFqK/phonto.jpg">
  <link rel="icon" sizes="192x192" href="https://i.ibb.co/kV9gcFqK/phonto.jpg">
  <link rel="shortcut icon" href="https://i.ibb.co/kV9gcFqK/phonto.jpg">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    const IconPlus = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconHome = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconSearch = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconClock = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconFileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconCalendar = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconLoader = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const IconEye = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const IconEyeOff = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
    const IconImage = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconList = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const IconChevronLeft = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const IconTrash = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;

    // ==========================================
    // 🎨 COLORS — Pink Palette from Noguchi Design
    // ==========================================
    const COLORS = {
      blue: '#372d36',
      pink: '#e5a9bf',
      purple: '#241a22',
      orange: '#372d36',
      bg: '#241a22',
      white: '#fdd6dd',
      textMain: '#fdd6dd',
      textSoft: '#e5a9bf',
      pinkDeep: '#e5a9bf',
      blueDeep: '#fdd6dd',
      purpleDeep: '#e5a9bf',
      orangeDeep: '#fdd6dd',
      cardBg: '#372d36',
      cardBgDone: '#2e2430',
      cardWhite: '#372d36',
      cardBorder: '#e5a9bf',
      cardInner: '#241a22',
      cloudWhite: '#e5a9bf',
      modalBg: '#372d36',
      navBarBg: '#372d36',
      profileBorder: '#e5a9bf',
      buttonBg: '#241a22',
      dividerColor: '#e5a9bf',
      emptyStateBg: '#372d36',
      calendarBg: '#372d36',
      searchInputBg: '#372d36',
      filterBarBg: '#372d36',
      bannerOverlayBg: '#241a22',
    };

    // สถานะทั้งหมด 6 ระดับและ % ที่สัมพันธ์กัน
    const STATUS_MAP = {
      'waiting': { label: 'รอคิว', percent: 0, color: '#e5a9bf60' },
      'designing': { label: 'กำลังออกแบบ', percent: 20, color: '#b5a1c4' },
      'design_sent': { label: 'ส่งแบบแล้ว', percent: 40, color: '#a0b9cc' },
      'doing_nails': { label: 'กำลังทำเล็บ', percent: 60, color: '#e5a9bf' },
      'nails_done': { label: 'เล็บเสร็จแล้ว', percent: 80, color: '#fdd6dd' },
      'delivered': { label: 'ส่งแล้ว', percent: 100, color: '#a8d5a2' }
    };

    const DynamicBackground = React.memo(() => (
      <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div className="absolute inset-0 animate-gradient-shift" style={{
          background: 'linear-gradient(135deg, #241a22 0%, #2e1e28 20%, #372d36 40%, #3a2535 60%, #241a22 80%, #2a1e2e 100%)',
          backgroundSize: '400% 400%',
        }}></div>
        <div className="absolute rounded-full animate-orb-1" style={{
          width: '70vw', height: '70vw', top: '-15%', left: '-20%',
          background: 'radial-gradient(circle, #e5a9bf55 0%, #e5a9bf22 50%, transparent 70%)', filter: 'blur(60px)',
        }}></div>
        <div className="absolute rounded-full animate-orb-2" style={{
          width: '60vw', height: '60vw', bottom: '-10%', right: '-15%',
          background: 'radial-gradient(circle, #fdd6dd44 0%, #fdd6dd18 50%, transparent 70%)', filter: 'blur(70px)',
        }}></div>
        <div className="absolute rounded-full animate-orb-3" style={{
          width: '50vw', height: '50vw', top: '30%', left: '25%',
          background: 'radial-gradient(circle, #e5a9bf33 0%, #c4728a1a 50%, transparent 70%)', filter: 'blur(80px)',
        }}></div>
        <div className="absolute rounded-full animate-orb-4" style={{
          width: '35vw', height: '35vw', top: '5%', right: '0%',
          background: 'radial-gradient(circle, #fdd6dd30 0%, #e5a9bf15 50%, transparent 70%)', filter: 'blur(50px)',
        }}></div>
        <div className="absolute rounded-full animate-orb-5" style={{
          width: '45vw', height: '45vw', bottom: '10%', left: '5%',
          background: 'radial-gradient(circle, #372d3680 0%, #372d3630 50%, transparent 70%)', filter: 'blur(60px)',
        }}></div>
        <div className="absolute inset-0 animate-shimmer-sweep opacity-20" style={{
          background: 'linear-gradient(105deg, transparent 40%, #fdd6dd18 50%, transparent 60%)', backgroundSize: '200% 200%',
        }}></div>
      </div>
    ));

    const Header = React.memo(({ isAdmin, setIsAdmin, setShowAuthModal, handleImageUpload, profileImage }) => (
      <div className="px-5 pt-6 pb-2 relative z-10">
        <div className="backdrop-blur-md rounded-[32px] p-4 shadow-xl flex items-center justify-between h-20 relative overflow-hidden group" style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: `${COLORS.cardBorder}60` }}>
          <div className="absolute left-6 top-1/2 -translate-y-1/2 w-24 h-8 blur-xl rounded-full opacity-20" style={{ backgroundColor: COLORS.pink }}></div>
          <div className="flex flex-col justify-center ml-2 relative z-10">
            <div className="flex items-center gap-1">
              <h1 className="text-2xl font-black italic tracking-tighter flex">
                {"Vampnails444".split('').map((char, index) => (
                  <span
                    key={index}
                    className={`bg-clip-text text-transparent drop-shadow-sm inline-block animate-text-wave pb-2 ${char === ' ' ? 'w-2.5' : 'pr-[1.5px]'}`}
                    style={{ backgroundImage: `linear-gradient(to bottom right, #fdd6dd, #e5a9bf)`, animationDelay: `${index * 0.1}s` }}
                  >
                    {char}
                  </span>
                ))}
              </h1>
              <button onClick={() => isAdmin ? setIsAdmin(false) : setShowAuthModal(true)} className={`px-1.5 py-0.5 ml-1 rounded-full text-[7px] font-black uppercase tracking-widest border shadow-sm transition-all active:scale-95`} style={{ backgroundColor: isAdmin ? `${COLORS.buttonBg}99` : `${COLORS.buttonBg}cc`, color: isAdmin ? '#fdd6dd' : '#e5a9bf', borderColor: isAdmin ? '#e5a9bf' : '#e5a9bf40' }}>
                {isAdmin ? 'Admin' : 'Guest'}
              </button>
            </div>
            <div className="flex items-center gap-1.5 opacity-70">
              <div className="w-3 h-[1px]" style={{ backgroundColor: COLORS.pinkDeep }}></div>
              <p className="text-[8px] font-black tracking-[0.5em] uppercase" style={{ color: COLORS.purpleDeep }}>Check Q</p>
            </div>
          </div>
          <div onClick={isAdmin ? handleImageUpload : undefined} className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center relative overflow-hidden transition-transform ${isAdmin ? 'cursor-pointer hover:scale-105 active:scale-95' : ''}`} style={{ backgroundColor: COLORS.cardInner, borderWidth: '2px', borderColor: COLORS.profileBorder }}>
            {profileImage ? (
              <img src={profileImage} alt="Profile" className="w-full h-full object-cover" />
            ) : (
              <>
                <div className="absolute inset-0 opacity-30" style={{ background: `linear-gradient(to top right, ${COLORS.pink}, ${COLORS.white})` }}></div>
                <span className="text-2xl relative z-10 select-none">🐰</span>
              </>
            )}
          </div>
        </div>
      </div>
    ));

    const ProgressFlower = React.memo(({ progress, todayTasksLength, doneToday, triggerFlowerBounce, isBouncing }) => {
      const bloomScale = Math.max(0.2, progress / 100);
      const isFullBloom = progress === 100 && todayTasksLength > 0;
      const petals = [0, 72, 144, 216, 288].map(angle => {
        const rad = (angle * Math.PI) / 180;
        return { cx: 50 + 15 * Math.sin(rad), cy: 50 - 15 * Math.cos(rad), r: 18 };
      });

      return (
        <div onClick={triggerFlowerBounce} className={`backdrop-blur-sm rounded-[28px] p-3 flex flex-col items-center justify-center shadow-lg h-full relative overflow-hidden transition-all duration-300 cursor-pointer ${isBouncing ? 'scale-95' : 'hover:scale-[1.02]'}`} style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
          <div className="absolute top-2 left-3 text-[8px] font-black uppercase tracking-tighter opacity-70" style={{ color: COLORS.purpleDeep }}>ความสำเร็จวันนี้</div>
          <div className="relative w-full h-20 flex items-center justify-center mt-2">
            {progress > 0 && (
              <div className="absolute inset-0 pointer-events-none">
                <div className="absolute top-1/2 left-1/4 w-1.5 h-1.5 rounded-full animate-float-particle-1 opacity-60" style={{ backgroundColor: '#e5a9bf' }}></div>
                <div className="absolute top-2/3 right-1/4 w-2 h-2 rounded-full animate-float-particle-2 opacity-60" style={{ backgroundColor: '#fdd6dd' }}></div>
                <div className="absolute top-1/3 right-1/3 w-1.5 h-1.5 rounded-full animate-float-particle-3 opacity-60" style={{ backgroundColor: '#e5a9bf' }}></div>
              </div>
            )}
            <svg viewBox="0 0 100 100" className="w-20 h-20 overflow-visible">
              <g transform="translate(50, 50)">
                <g className="animate-breathe">
                  <g transform={`scale(${bloomScale})`} className="transition-transform duration-1000 cubic-bezier(0.34, 1.56, 0.64, 1)">
                    <g transform="translate(-50, -50)">
                      {petals.map((p, i) => (
                        <circle key={i} cx={p.cx} cy={p.cy} r={p.r} fill="#e5a9bf" opacity="0.95" className="transition-all duration-700"/>
                      ))}
                      <circle cx="50" cy="50" r="14" fill="#fdd6dd" className="transition-all duration-700" />
                      {isFullBloom && (
                        <g transform="translate(50, 50)" className="animate-fade-in">
                          <path d="M -5 -1 Q -3 -3 -1 -1" fill="none" stroke="#241a22" strokeWidth="1.2" strokeLinecap="round" />
                          <path d="M 1 -1 Q 3 -3 5 -1" fill="none" stroke="#241a22" strokeWidth="1.2" strokeLinecap="round" />
                          <path d="M -1.5 2 Q 0 4 1.5 2" fill="none" stroke="#241a22" strokeWidth="1.2" strokeLinecap="round" />
                          <ellipse cx="-6" cy="1" rx="1.5" ry="1" fill="#372d36" opacity="0.6"/>
                          <ellipse cx="6" cy="1" rx="1.5" ry="1" fill="#372d36" opacity="0.6"/>
                        </g>
                      )}
                    </g>
                  </g>
                </g>
              </g>
            </svg>
          </div>
          <div className="mt-1 flex items-center gap-1 px-2 py-0.5 rounded-full z-10" style={{ backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
            <span className="text-xs font-black" style={{ color: COLORS.purpleDeep }}>{progress}%</span>
            <div className="w-1 h-1 rounded-full" style={{ backgroundColor: COLORS.pink }}></div>
            <span className="text-[8px] font-bold uppercase" style={{ color: COLORS.textSoft }}>{doneToday} / {todayTasksLength} งาน</span>
          </div>
        </div>
      );
    });

    const CompactStats = React.memo(({ isAdmin, selectedNextDate, nextQueueDate, handleSetManualDate, waitingCount }) => (
      <div className="backdrop-blur-sm rounded-[28px] p-1 shadow-lg h-full flex overflow-hidden relative group transition-all" style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
        <div className={`flex-1 flex flex-col justify-center items-center p-2 relative rounded-l-[24px] transition-colors overflow-hidden ${isAdmin ? 'cursor-pointer' : ''}`} style={{ backgroundColor: `${COLORS.orange}66` }}>
          {isAdmin && (
            <input type="date" className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10" value={selectedNextDate || nextQueueDate} onChange={(e) => handleSetManualDate(e.target.value)} />
          )}
          <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-md text-[7px] font-black shadow-sm uppercase tracking-wider whitespace-nowrap" style={{ color: COLORS.orangeDeep, backgroundColor: COLORS.buttonBg, borderWidth: '1px', borderColor: '#e5a9bf60' }}>NEXT QUEUE</div>
          <div className="flex flex-col items-center mt-1 relative z-0 pointer-events-none">
            <span className="text-3xl font-black leading-none tracking-tighter" style={{ color: COLORS.textMain }}>{new Date(nextQueueDate).getDate()}</span>
            <span className="text-[8px] font-black opacity-80 uppercase mt-0.5" style={{ color: COLORS.orangeDeep }}>{new Date(nextQueueDate).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</span>
          </div>
          {isAdmin && selectedNextDate && (
            <button
              onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleSetManualDate(''); }}
              className="absolute bottom-1.5 left-1/2 -translate-x-1/2 z-20 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm active:scale-90 transition-all"
              style={{ color: COLORS.pinkDeep, backgroundColor: COLORS.buttonBg, borderWidth: '1px', borderColor: '#e5a9bf60' }}
              title="กลับไปคำนวณวันว่างอัตโนมัติ"
            >
              AUTO
            </button>
          )}
        </div>

        <div className="my-4 rounded-full" style={{ width: '1px', backgroundColor: `${COLORS.dividerColor}60` }}></div>

        <div className="flex-1 flex flex-col justify-center items-center p-2 relative">
          <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm uppercase tracking-wider whitespace-nowrap z-10" style={{ color: COLORS.blueDeep, backgroundColor: COLORS.buttonBg, borderWidth: '1px', borderColor: '#e5a9bf60' }}>จำนวนคิวก่อนหน้า</div>
          <div className="relative mt-5 flex flex-col items-center">
            <div className="relative">
              <div className="absolute inset-0 blur-lg rounded-full opacity-30 scale-125" style={{ backgroundColor: COLORS.pink }}></div>
              <div className="w-11 h-11 rounded-full flex flex-col items-center justify-center shadow-inner relative z-10" style={{ backgroundColor: COLORS.cardInner, borderWidth: '2px', borderColor: '#e5a9bf60' }}>
                <span className="text-xl font-black leading-none" style={{ color: COLORS.blueDeep }}>{waitingCount}</span>
              </div>
            </div>
            <span className="text-[8px] font-black opacity-60 uppercase mt-1.5 relative z-10" style={{ color: COLORS.blueDeep }}>คิว</span>
          </div>
        </div>
      </div>
    ));

    const TaskCard = React.memo(({ task, isAdmin, onEdit, onStatusChange }) => {
      let currentStatusKey = task.status;
      if (currentStatusKey === 'todo') currentStatusKey = 'waiting';
      if (currentStatusKey === 'doing') currentStatusKey = 'doing_nails';
      if (currentStatusKey === 'done') currentStatusKey = 'delivered';
      
      const currentStatusInfo = STATUS_MAP[currentStatusKey] || STATUS_MAP['waiting'];
      const percent = currentStatusInfo.percent;
      const isDelivered = currentStatusKey === 'delivered';

      return (
        <div onClick={() => isAdmin && onEdit(task)} className={`relative mb-2 rounded-[22px] p-3 transition-all shadow-sm group backdrop-blur-sm ${isAdmin ? 'active:scale-[0.97] cursor-pointer' : ''}`}
          style={{
            backgroundColor: isDelivered ? COLORS.cardBgDone : COLORS.cardBg,
            borderWidth: '1px',
            borderStyle: 'solid',
            borderColor: isDelivered ? 'transparent' : '#e5a9bf30',
            opacity: isDelivered ? 0.7 : 1
          }}
        >
          {percent > 0 && percent < 100 && (
            <div className="absolute inset-0 pointer-events-none z-0">
              <div className="absolute -bottom-2 -left-3 text-[14px] animate-float-particle-1 drop-shadow-sm">✨</div>
              <div className="absolute top-[30%] -right-4 text-[10px] animate-float-particle-1 drop-shadow-sm" style={{ animationDelay: '1.2s' }}>✨</div>
            </div>
          )}
          <div className="absolute left-2 top-3 bottom-3 w-1 rounded-full shadow-sm z-10" style={{ backgroundColor: task.channel === 'LINE' ? '#a8d5a2' : task.channel === 'FB' || task.channel === 'FACEBOOK' ? '#a0b9cc' : task.channel === 'IG' ? '#e5a9bf' : '#fdd6dd' }}></div>
          
          <div className="pl-3 pr-1 relative z-10">
            <div className="flex justify-between items-start mb-1">
              <div className="flex items-center gap-2 min-w-0">
                <span className="font-bold text-base truncate" style={{ color: COLORS.textMain }}>{task.client}</span>
                <span className={`text-[7px] px-1.5 py-0.5 rounded-md font-black uppercase border ${
                  task.channel === 'LINE' ? 'border-[#a8d5a2]/30' :
                  task.channel === 'FB' || task.channel === 'FACEBOOK' ? 'border-[#a0b9cc]/30' :
                  task.channel === 'IG' ? 'border-[#e5a9bf]/30' :
                  'border-[#fdd6dd]/20'
                }`} style={{ color: COLORS.textSoft, backgroundColor: '#24192210' }}>{task.channel}</span>
                {task.priority === 'urgent' && <span className="text-[9px] font-bold animate-pulse px-2 py-0.5 rounded-full shadow-sm" style={{ color: COLORS.pinkDeep, backgroundColor: COLORS.buttonBg }}>{'\u{1F525}'} ด่วน</span>}
              </div>
              <div className="flex items-center gap-1 text-[9px] font-black px-2.5 py-0.5 rounded-lg shadow-sm" style={{ color: COLORS.pinkDeep, backgroundColor: `${COLORS.cardInner}80`, borderWidth: '1px', borderColor: '#e5a9bf40' }}>
                <IconCalendar size={11} style={{ color: COLORS.pinkDeep }} />
                {new Date(task.deadline).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' })}
              </div>
            </div>

            <div className="flex justify-between items-end mt-1">
              <div className="flex-1 min-w-0 mr-4 flex flex-col">
                <span className={`text-[10px] font-bold truncate ${isDelivered ? 'line-through' : ''}`} style={{ color: isDelivered ? '#e5a9bf40' : '#e5a9bf80' }}>{task.type}</span>
                {task.details && (
                  <span className={`text-[11px] font-medium truncate mt-0.5`} style={{ color: isDelivered ? '#fdd6dd30' : '#fdd6dd90' }}>{task.details}</span>
                )}
              </div>

              {isAdmin ? (
                <div onClick={(e) => e.stopPropagation()} className="relative">
                  <select
                    value={currentStatusKey}
                    onChange={(e) => onStatusChange(task.id, e.target.value)}
                    className="appearance-none bg-[#241a22] text-[#fdd6dd] text-[10px] font-bold px-3 py-1.5 pr-6 rounded-[8px] outline-none cursor-pointer shadow-sm border border-[#e5a9bf40] hover:border-[#e5a9bf] transition-colors"
                  >
                    <option value="waiting">รอคิว</option>
                    <option value="designing">กำลังออกแบบ</option>
                    <option value="design_sent">ส่งแบบแล้ว</option>
                    <option value="doing_nails">กำลังทำเล็บ</option>
                    <option value="nails_done">เล็บเสร็จแล้ว</option>
                    <option value="delivered">ส่งแล้ว</option>
                  </select>
                  <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-1.5 text-[#e5a9bf]">
                    <svg className="fill-current h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                  </div>
                </div>
              ) : (
                <div className="flex items-center">
                  <span className="text-[10px] font-bold flex items-center gap-1 px-2 py-1 rounded-md shadow-sm" style={{ color: currentStatusInfo.color, backgroundColor: `${COLORS.buttonBg}`, borderWidth: '1px', borderColor: '#e5a9bf40' }}>
                    {currentStatusInfo.label}
                  </span>
                </div>
              )}
            </div>

            {/* แถบ Progress Bar ขอบเรืองแสง d18a9e (หนา 2px เข้มขึ้น) ไดนามิกแบบ Shine Sweep สี fdd6dd */}
            <div className="mt-3 w-full h-[12px] rounded-full overflow-hidden relative" 
                 style={{ 
                   backgroundColor: '#241a22', 
                   border: '2px solid #d18a9e', /* Updated thickness (1->2) and color (#e5a9bf->#d18a9e) */
                   boxShadow: '0 0 8px #d18a9e80, inset 0 1px 3px rgba(0,0,0,0.5)' /* Updated glow color to match new darker border and made it slightly stronger */
                 }}>
              <div 
                className="h-full rounded-full transition-all duration-1000 ease-in-out relative overflow-hidden"
                style={{ 
                  width: `${percent}%`, 
                  backgroundColor: '#fdd6dd', /* Background color inside stays fdd6dd */
                  boxShadow: `0 0 8px #fdd6dd80`
                }}
              >
                {/* White line sweep animation - kept as requested */}
                <div className="absolute top-0 bottom-0 w-[60%] animate-shine-sweep"
                     style={{
                       background: 'linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.7), transparent)'
                     }}>
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    });

    const CalendarView = React.memo(({ currentMonth, setCurrentMonth, selectedDate, setSelectedDate, today, tasks }) => {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

      return (
        <div className="backdrop-blur-xl rounded-[32px] p-5 shadow-xl mb-5 animate-fadeIn" style={{ backgroundColor: `${COLORS.calendarBg}e6`, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
          <div className="flex justify-between items-center mb-4 px-2">
            <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))} className="p-1.5 rounded-full transition-colors" style={{ color: COLORS.textSoft, backgroundColor: `${COLORS.buttonBg}80` }}><IconChevronLeft size={20}/></button>
            <h3 className="font-black text-[16px] tracking-widest" style={{ color: COLORS.textMain }}>{monthNames[month]} {year}</h3>
            <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))} className="p-1.5 rounded-full transition-colors" style={{ color: COLORS.textSoft, backgroundColor: `${COLORS.buttonBg}80` }}><IconChevronRight size={20}/></button>
          </div>

          <div className="grid grid-cols-7 gap-1 text-center mb-3">
            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
              <div key={d} className="text-[9px] font-black uppercase opacity-50" style={{ color: COLORS.textSoft }}>{d}</div>
            ))}
          </div>

          <div className="grid grid-cols-7 gap-y-3 gap-x-1 text-center">
            {days.map((day, index) => {
              if (!day) return <div key={`empty-${index}`} className="h-10"></div>;

              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const isSelected = selectedDate === dateStr;
              const isToday = today === dateStr;
              const hasTasks = tasks.some(t => t.deadline === dateStr);

              return (
                <div key={dateStr} className="flex justify-center items-center h-10">
                  <div
                    onClick={() => setSelectedDate(dateStr)}
                    className="relative w-10 h-10 flex flex-col items-center justify-center cursor-pointer transition-all rounded-full"
                    style={{
                      backgroundColor: isSelected ? '#e5a9bf' : isToday ? '#e5a9bf30' : 'transparent',
                      color: isSelected ? '#241a22' : isToday ? '#fdd6dd' : '#e5a9bf',
                      fontWeight: isSelected || isToday ? '900' : '700',
                      transform: isSelected ? 'scale(1.05)' : 'scale(1)',
                      borderWidth: isToday && !isSelected ? '2px' : '0',
                      borderColor: '#e5a9bf60'
                    }}
                  >
                    <span className="text-[13px] z-10 leading-none">{day}</span>
                    {hasTasks && (
                      <div className="absolute bottom-1 w-1.5 h-1.5 rounded-full" style={{ backgroundColor: isSelected ? '#241a22' : '#e5a9bf' }}></div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    });

    function App() {
      const [tasks, setTasks] = useState([]);
      const [taskTypes, setTaskTypes] = useState(['Logo', 'Banner', 'Artwork']);
      const [channels, setChannels] = useState(['LINE', 'FB', 'IG']);

      const [isLoading, setIsLoading] = useState(true);
      const [isSaving, setIsSaving] = useState(false);

      const [view, setView] = useState('dashboard');
      const [isCalendarView, setIsCalendarView] = useState(false);
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      });

      const [showModal, setShowModal] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [taskToDelete, setTaskToDelete] = useState(null);
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [showImageModal, setShowImageModal] = useState(false);
      const [showBannerModal, setShowBannerModal] = useState(false);

      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all');

      const [isAdmin, setIsAdmin] = useState(false);
      const [password, setPassword] = useState('');
      const [authError, setAuthError] = useState(false);
      const [isVerifyingAuth, setIsVerifyingAuth] = useState(false);

      const [profileImage, setProfileImage] = useState(null);
      const [tempImageUrl, setTempImageUrl] = useState('');
      const [bannerImage, setBannerImage] = useState(null);
      const [tempBannerUrl, setTempBannerUrl] = useState('');
      const [isBannerVisible, setIsBannerVisible] = useState(true);

      const [selectedNextDate, setSelectedNextDate] = useState('');
      const [isBouncing, setIsBouncing] = useState(false);

      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwYNFrxiYMmD18HHuW7h9SSy2tlTRwbga8zWY7HVfslkRwn_u-mtj1j0ouWm1DW-gv8mQ/exec";

      const fetchAPI = async (payload) => {
        try {
          const res = await fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          return await res.json();
        } catch (error) {
          console.error("API Error:", error);
          throw error;
        }
      };

      useEffect(() => {
        document.title = "Vampnails444";
        fetch(WEB_APP_URL + "?action=getInitialData")
          .then(res => res.json())
          .then(response => {
            if (response.status === 'success') {
              setTasks(response.data.tasks || []);
              if (response.data.taskTypes && response.data.taskTypes.length > 0) setTaskTypes(response.data.taskTypes);
              if (response.data.channels && response.data.channels.length > 0) setChannels(response.data.channels);
              if (response.data.profileImage) setProfileImage(response.data.profileImage);
              if (response.data.bannerImage) setBannerImage(response.data.bannerImage);
              if (response.data.bannerVisible !== undefined) setIsBannerVisible(response.data.bannerVisible);
              if (response.data.lockedNextDate) setSelectedNextDate(response.data.lockedNextDate);
            }
            setIsLoading(false);
          })
          .catch(error => {
            console.error("Error loading data:", error);
            setIsLoading(false);
          });
      }, []);

      const handleAdminLogin = (e) => {
        e.preventDefault();
        setIsVerifyingAuth(true);
        setAuthError(false);
        fetchAPI({ action: 'verifyAdminPassword', inputPassword: password })
          .then(res => {
            setIsVerifyingAuth(false);
            if (res.isValid) {
              setIsAdmin(true); setShowAuthModal(false); setPassword(''); setAuthError(false);
            } else setAuthError(true);
          })
          .catch(() => { setIsVerifyingAuth(false); setAuthError(true); });
      };

      const handleSetManualDate = useCallback((dateVal) => {
        setSelectedNextDate(dateVal);
        fetchAPI({ action: 'saveLockedNextDate', dateStr: dateVal });
      }, []);

      const today = useMemo(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }, []);

      const todayTasks = useMemo(() => tasks.filter(t => t.deadline === today), [tasks, today]);
      
      const doneToday = useMemo(() => todayTasks.filter(t => t.status === 'delivered' || t.status === 'done').length, [todayTasks]);
      const progress = todayTasks.length === 0 ? 0 : Math.round((doneToday / todayTasks.length) * 100);

      const nextQueueDate = useMemo(() => {
        if (selectedNextDate) return selectedNextDate;
        let checkDate = new Date();
        for (let i = 0; i < 365; i++) {
          const y = checkDate.getFullYear();
          const m = String(checkDate.getMonth() + 1).padStart(2, '0');
          const d = String(checkDate.getDate()).padStart(2, '0');
          const dateStr = `${y}-${m}-${d}`;
          const tasksOnDate = tasks.filter(t => t.deadline === dateStr);
          if (tasksOnDate.length === 0) return dateStr;
          checkDate.setDate(checkDate.getDate() + 1);
        }
        return today;
      }, [tasks, selectedNextDate]);

      const waitingCount = useMemo(() => tasks.filter(t => t.status !== 'delivered' && t.status !== 'done').length, [tasks]);

      const handleStatusChange = useCallback((id, newStatus) => {
        setTasks(prev => prev.map(t => {
          if (t.id === id) {
            fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: newStatus });
            return { ...t, status: newStatus };
          }
          return t;
        }));
      }, []);

      const handleEditTask = useCallback((task) => {
        setEditingTask(task);
        setShowModal(true);
      }, []);

      const handleSaveTask = (e) => {
        e.preventDefault();
        setIsSaving(true);
        const formData = new FormData(e.target);
        const taskData = {
          id: editingTask ? editingTask.id : null,
          title: '',
          client: formData.get('client'),
          type: formData.get('type'),
          channel: formData.get('channel'),
          priority: formData.get('priority') ? 'urgent' : 'normal',
          deadline: formData.get('deadline'),
          details: formData.get('details'),
          status: formData.get('status') || 'waiting'
        };
        fetchAPI({ action: 'saveOrUpdateTask', task: taskData })
          .then(res => {
            if (res.status === 'success') {
              setTasks(prev => editingTask ? prev.map(t => t.id === res.task.id ? res.task : t) : [...prev, res.task]);
            }
            setIsSaving(false); setShowModal(false); setEditingTask(null);
          })
          .catch(() => { setIsSaving(false); });
      };

      const executeDeleteTask = () => {
        if (!taskToDelete) return;
        setIsSaving(true);
        fetchAPI({ action: 'deleteTask', taskId: taskToDelete })
          .then(() => {
            setTasks(prev => prev.filter(t => t.id !== taskToDelete));
            setIsSaving(false); setShowModal(false); setEditingTask(null); setTaskToDelete(null);
          })
          .catch(() => { setIsSaving(false); });
      };

      const toggleBannerVisibility = (visible) => {
        setIsBannerVisible(visible);
        fetchAPI({ action: 'saveBannerVisibility', isVisible: visible });
      };

      const triggerFlowerBounce = useCallback(() => { setIsBouncing(true); setTimeout(() => setIsBouncing(false), 500); }, []);
      const handleImageUpload = useCallback(() => { setShowImageModal(true); }, []);

      const filteredAllTasks = useMemo(() => tasks.filter(t => {
        const matchSearch = t.type.toLowerCase().includes(searchQuery.toLowerCase()) || t.client.toLowerCase().includes(searchQuery.toLowerCase());
        const isTaskDone = t.status === 'delivered' || t.status === 'done';
        const matchFilter = filterType === 'all' || (filterType === 'pending' && !isTaskDone) || (filterType === 'done' && isTaskDone);
        return matchSearch && matchFilter;
      }), [tasks, searchQuery, filterType]);

      const displayedTasks = isCalendarView
        ? filteredAllTasks.filter(t => t.deadline === selectedDate)
        : filteredAllTasks;

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center relative overflow-hidden" style={{ backgroundColor: COLORS.bg }}>
            <DynamicBackground />
            <div className="flex flex-col items-center z-10 animate-breathe">
              <div className="flex items-center gap-1.5 px-6 py-2.5 backdrop-blur-sm rounded-full shadow-sm" style={{ backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
                <p className="text-[12px] font-black tracking-widest" style={{ color: COLORS.textMain }}>กำลังโหลดข้อมูล</p>
                <div className="flex gap-1 pt-1 ml-1">
                  <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: COLORS.pinkDeep, animationDelay: '0s' }}></span>
                  <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: COLORS.blueDeep, animationDelay: '0.15s' }}></span>
                  <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: COLORS.purpleDeep, animationDelay: '0.3s' }}></span>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen font-sans relative" style={{ backgroundColor: COLORS.bg, color: COLORS.textMain }}>
          <DynamicBackground />
          <div className="max-w-md mx-auto min-h-screen relative pb-28">
            <Header isAdmin={isAdmin} setIsAdmin={setIsAdmin} setShowAuthModal={setShowAuthModal} handleImageUpload={handleImageUpload} profileImage={profileImage} />

            {/* Banner */}
            <div className="px-5 relative z-10 mb-4">
              {bannerImage && isBannerVisible && (
                <div className="relative group w-full h-32 rounded-[24px] overflow-hidden shadow-sm backdrop-blur-sm" style={{ borderWidth: '2px', borderColor: COLORS.cardBorder, backgroundColor: `${COLORS.cardWhite}66` }}>
                  <img src={bannerImage} alt="Shop Banner" className="w-full h-full object-cover" />
                  <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    {isAdmin && (
                      <button onClick={() => setShowBannerModal(true)} className="p-1.5 backdrop-blur-md rounded-full shadow-sm transition-colors" style={{ backgroundColor: `${COLORS.bannerOverlayBg}e6`, color: COLORS.textSoft }}>
                        <IconImage size={16} />
                      </button>
                    )}
                    {isAdmin && (
                      <button onClick={() => toggleBannerVisibility(false)} className="p-1.5 backdrop-blur-md rounded-full shadow-sm transition-colors" style={{ backgroundColor: `${COLORS.bannerOverlayBg}e6`, color: COLORS.textSoft }}>
                        <IconEyeOff size={16} />
                      </button>
                    )}
                  </div>
                </div>
              )}

              {bannerImage && !isBannerVisible && isAdmin && (
                <div className="flex justify-end mb-1">
                  <button onClick={() => toggleBannerVisibility(true)} className="text-[10px] font-bold flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full shadow-sm hover:opacity-80 transition-colors" style={{ color: COLORS.textSoft, backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                    <IconEye size={12} /> แสดงแบนเนอร์
                  </button>
                </div>
              )}

              {!bannerImage && isAdmin && (
                <div onClick={() => setShowBannerModal(true)} className="w-full h-16 rounded-[24px] border-[2px] border-dashed backdrop-blur-sm flex items-center justify-center cursor-pointer hover:opacity-80 transition-colors" style={{ borderColor: COLORS.cardBorder, backgroundColor: `${COLORS.cardWhite}33` }}>
                  <span className="text-[11px] font-bold flex items-center gap-2" style={{ color: COLORS.textSoft }}><IconPlus size={16}/> เพิ่มรูปแบนเนอร์ร้าน</span>
                </div>
              )}
            </div>

            {/* Main Content */}
            <div className="px-5 relative z-10">
              {view === 'dashboard' ? (
                <div className="animate-fadeIn">
                  <div className="flex gap-3 h-28 mb-4">
                    <div className="flex-[1.6]">
                      <CompactStats isAdmin={isAdmin} selectedNextDate={selectedNextDate} nextQueueDate={nextQueueDate} handleSetManualDate={handleSetManualDate} waitingCount={waitingCount} />
                    </div>
                    <div className="flex-1">
                      <ProgressFlower progress={progress} todayTasksLength={todayTasks.length} doneToday={doneToday} triggerFlowerBounce={triggerFlowerBounce} isBouncing={isBouncing} />
                    </div>
                  </div>
                  <div className="flex items-center justify-between mb-2.5 ml-1">
                    <h2 className="text-[10px] font-black italic uppercase tracking-[0.3em] opacity-50" style={{ color: COLORS.textSoft }}>Today's Task</h2>
                    <div className="h-[1px] flex-1 mx-3" style={{ background: `linear-gradient(to right, ${COLORS.pink}40, transparent)` }}></div>
                  </div>
                  <div className="space-y-1">
                    {todayTasks.length > 0 ? todayTasks.map(t => <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={handleEditTask} onStatusChange={handleStatusChange} />) : (
                      <div className="text-center py-10 rounded-[28px] border-2 border-dashed" style={{ backgroundColor: `${COLORS.cardWhite}20`, borderColor: '#e5a9bf30' }}>
                        <p className="text-[9px] font-bold uppercase tracking-widest opacity-40" style={{ color: COLORS.pinkDeep }}>Sky is clear ✨</p>
                      </div>
                    )}
                  </div>
                </div>
              ) : (
                <div className="animate-fadeIn">
                  <div className="relative mb-4">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-40" style={{ color: COLORS.blueDeep }}><IconSearch size={16} /></div>
                    <input type="text" placeholder="ค้นหาคิวงาน..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full rounded-[22px] py-3 pl-10 pr-4 outline-none text-xs shadow-lg transition-all backdrop-blur-sm" style={{ backgroundColor: `${COLORS.searchInputBg}cc`, borderWidth: '2px', borderColor: '#e5a9bf40', color: COLORS.textMain }} />
                  </div>

                  <div className="flex gap-2 mb-3 p-1.5 rounded-full backdrop-blur-md shadow-sm" style={{ backgroundColor: `${COLORS.filterBarBg}80`, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
                    <button onClick={() => setFilterType('all')} className="flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider" style={{ color: filterType === 'all' ? '#241a22' : COLORS.textSoft, backgroundColor: filterType === 'all' ? COLORS.pinkDeep : 'transparent' }}>ทั้งหมด</button>
                    <button onClick={() => setFilterType('pending')} className="flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider" style={{ color: filterType === 'pending' ? '#241a22' : COLORS.textSoft, backgroundColor: filterType === 'pending' ? COLORS.pinkDeep : 'transparent' }}>ยังไม่ได้เริ่ม</button>
                    <button onClick={() => setFilterType('done')} className="flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider" style={{ color: filterType === 'done' ? '#241a22' : COLORS.textSoft, backgroundColor: filterType === 'done' ? COLORS.pinkDeep : 'transparent' }}>เสร็จแล้ว</button>
                  </div>

                  <div className="flex justify-end mb-4 pr-1">
                    <button onClick={() => {
                      const newView = !isCalendarView;
                      setIsCalendarView(newView);
                      if(newView) setFilterType('all');
                    }} className="flex items-center gap-1.5 px-3 py-1.5 backdrop-blur-md rounded-full shadow-lg text-[9px] font-black uppercase tracking-widest transition-all active:scale-95" style={{ color: COLORS.textSoft, backgroundColor: `${COLORS.buttonBg}cc`, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
                      {isCalendarView ? <><IconList size={14} /> รูปแบบรายการ</> : <><IconCalendar size={14} /> รูปแบบปฏิทิน</>}
                    </button>
                  </div>

                  {isCalendarView && <CalendarView currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} selectedDate={selectedDate} setSelectedDate={setSelectedDate} today={today} tasks={tasks} />}

                  <div className="space-y-1">
                    {displayedTasks.length > 0 ? displayedTasks.map(t => <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={handleEditTask} onStatusChange={handleStatusChange} />) : (
                      <div className="text-center py-10 rounded-[28px] border-2 border-dashed shadow-sm mt-4" style={{ backgroundColor: `${COLORS.cardWhite}20`, borderColor: '#e5a9bf40' }}>
                        <p className="text-[10px] font-black uppercase tracking-widest opacity-50" style={{ color: COLORS.textSoft }}>
                          {isCalendarView ? "วันนี้คิวว่าง ✨" : "No records found ✨"}
                        </p>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* Bottom Nav */}
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[210px] z-50">
              <div className="backdrop-blur-xl rounded-full h-14 shadow-2xl flex items-center justify-between px-6 relative" style={{ backgroundColor: `${COLORS.navBarBg}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                <button onClick={() => setView('dashboard')} className="p-1 transition-all" style={{ color: view === 'dashboard' ? COLORS.pinkDeep : '#e5a9bf40', transform: view === 'dashboard' ? 'scale(1.1)' : 'scale(1)' }}>
                  <IconHome size={22} />
                </button>
                <div className="w-8"></div>
                <button onClick={() => setView('all')} className="p-1 transition-all" style={{ color: view === 'all' ? COLORS.blueDeep : '#e5a9bf40', transform: view === 'all' ? 'scale(1.1)' : 'scale(1)' }}>
                  <IconFileText size={22} />
                </button>
                {isAdmin && (
                  <div className="absolute left-1/2 -translate-x-1/2 -top-6">
                    <button onClick={() => { setEditingTask(null); setShowModal(true); }} className="w-14 h-14 rounded-full text-white flex items-center justify-center shadow-xl active:scale-90 transition-transform" style={{ background: `linear-gradient(to bottom right, #e5a9bf, #fdd6dd)`, color: '#241a22', borderWidth: '4px', borderColor: COLORS.cardBorder }}>
                      <IconPlus size={24} />
                    </button>
                  </div>
                )}
              </div>
            </div>

            {/* Modal: Add/Edit Task */}
            {showModal && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 backdrop-blur-[2px] animate-fadeIn" style={{ backgroundColor: '#241a2240' }}>
                <form onSubmit={handleSaveTask} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f5`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                  <h3 className="text-sm font-black mb-4 text-center" style={{ color: COLORS.textMain }}>{editingTask ? 'แก้ไขคิวงาน ✨' : 'เพิ่มคิวใหม่ ✨'}</h3>
                  <div className="space-y-2 relative">
                    {isSaving && (
                      <div className="absolute inset-0 z-50 flex flex-col items-center justify-center rounded-2xl backdrop-blur-sm" style={{ backgroundColor: `${COLORS.modalBg}cc` }}>
                        <IconLoader size={32} className="animate-spin-slow" style={{ color: COLORS.pinkDeep }} />
                        <span className="text-[10px] font-black mt-2" style={{ color: COLORS.textSoft }}>กำลังบันทึก...</span>
                      </div>
                    )}

                    <div className="flex justify-end mb-1">
                      <label className="flex items-center cursor-pointer gap-2 px-3 py-1.5 rounded-full shadow-sm" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#e5a9bf30' }}>
                        <span className="text-[10px] font-bold" style={{ color: COLORS.textSoft }}>คิวด่วน 🔥</span>
                        <div className="relative">
                          <input type="checkbox" name="priority" value="urgent" defaultChecked={editingTask?.priority === 'urgent'} className="sr-only peer" />
                          <div className="w-8 h-4 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[#e5a9bf]"></div>
                        </div>
                      </label>
                    </div>

                    <input name="client" required defaultValue={editingTask?.client || ''} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#e5a9bf30', color: COLORS.textMain }} placeholder="ชื่อลูกค้า" />

                    <div className="flex flex-col gap-2">
                      <input list="taskTypesList" name="type" required defaultValue={editingTask?.type || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none shadow-sm" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#e5a9bf30', color: COLORS.textMain }} placeholder="ประเภทงาน" />
                      <datalist id="taskTypesList">
                        {taskTypes.map(type => <option key={type} value={type} />)}
                      </datalist>

                      <input list="channelsList" name="channel" required defaultValue={editingTask?.channel || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none shadow-sm" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#e5a9bf30', color: COLORS.textMain }} placeholder="ช่องทาง" />
                      <datalist id="channelsList">
                        {channels.map(ch => <option key={ch} value={ch} />)}
                      </datalist>
                    </div>

                    <div className="flex flex-col gap-2 relative">
                      <select name="status" defaultValue={editingTask?.status || 'waiting'} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none shadow-sm appearance-none cursor-pointer" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#e5a9bf30', color: COLORS.textMain }}>
                        <option value="waiting">รอคิว (0%)</option>
                        <option value="designing">กำลังออกแบบ (20%)</option>
                        <option value="design_sent">ส่งแบบแล้ว (40%)</option>
                        <option value="doing_nails">กำลังทำเล็บ (60%)</option>
                        <option value="nails_done">เล็บเสร็จแล้ว (80%)</option>
                        <option value="delivered">ส่งแล้ว (100%)</option>
                      </select>
                      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4" style={{ color: COLORS.textSoft }}>
                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                      </div>
                    </div>

                    <textarea name="details" rows="2" defaultValue={editingTask?.details || ''} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all resize-none" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#e5a9bf30', color: COLORS.textMain }} placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)..."></textarea>

                    <div className="flex items-center justify-between p-1.5 pl-4 rounded-2xl mt-1" style={{ backgroundColor: '#e5a9bf15', borderWidth: '1px', borderColor: '#e5a9bf40' }}>
                      <div className="flex items-center gap-1.5 text-[10px] uppercase tracking-wider font-black" style={{ color: COLORS.pinkDeep }}>
                        <IconCalendar size={12} /><span>Deadline</span>
                      </div>
                      <input name="deadline" type="date" required defaultValue={editingTask?.deadline || nextQueueDate} className="w-32 p-2.5 rounded-xl outline-none text-[10px] font-black transition-all cursor-pointer" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#e5a9bf40', color: COLORS.textMain }} />
                    </div>

                    <div className="flex items-center gap-2 mt-3">
                      <button type="submit" className="flex-1 py-3.5 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-all disabled:opacity-50" style={{ backgroundColor: '#e5a9bf', color: '#241a22' }}>บันทึกคิวงาน</button>
                      {editingTask && (
                        <button type="button" onClick={() => setTaskToDelete(editingTask.id)} className="w-12 h-[44px] flex items-center justify-center rounded-2xl active:scale-95 transition-all shadow-sm" style={{ backgroundColor: '#e5a9bf20', color: '#e5a9bf', borderWidth: '1px', borderColor: '#e5a9bf40' }}>
                          <IconTrash size={18} />
                        </button>
                      )}
                    </div>
                    <button type="button" onClick={() => { setShowModal(false); setEditingTask(null); }} className="w-full text-[9px] font-bold mt-2 uppercase tracking-widest opacity-40" style={{ color: COLORS.textSoft }}>Close</button>
                  </div>
                </form>
              </div>
            )}

            {/* Modal: Admin Login */}
            {showAuthModal && (
              <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 backdrop-blur-[2px] animate-fadeIn" style={{ backgroundColor: '#241a2240' }}>
                <form onSubmit={handleAdminLogin} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f5`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                  <h3 className="text-sm font-black mb-4 text-center" style={{ color: COLORS.textMain }}>เข้าสู่ระบบ Admin</h3>
                  <div className="space-y-2">
                    <input type="password" required value={password} onChange={(e) => { setPassword(e.target.value); setAuthError(false); }} className={`w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all text-center tracking-widest`} style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: authError ? '#e5a9bf80' : '#e5a9bf30', color: COLORS.textMain }} placeholder="ใส่รหัสผ่าน" disabled={isVerifyingAuth} />
                    {authError && <p className="text-[9px] text-center font-bold" style={{ color: '#e5a9bf' }}>รหัสผ่านไม่ถูกต้อง!</p>}
                    <button type="submit" disabled={isVerifyingAuth} className="w-full h-11 rounded-2xl font-black text-xs mt-3 shadow-lg flex items-center justify-center active:scale-95 transition-all disabled:opacity-70" style={{ backgroundColor: '#e5a9bf', color: '#241a22' }}>
                      {isVerifyingAuth ? <IconLoader size={16} className="animate-spin-slow" /> : 'Login'}
                    </button>
                    <button type="button" onClick={() => { setShowAuthModal(false); setAuthError(false); setPassword(''); }} className="w-full text-[9px] font-bold mt-1 uppercase tracking-widest opacity-40" style={{ color: COLORS.textSoft }} disabled={isVerifyingAuth}>Close</button>
                  </div>
                </form>
              </div>
            )}

            {/* Modal: Profile Image */}
            {showImageModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 backdrop-blur-[2px] animate-fadeIn" style={{ backgroundColor: '#241a2240' }}>
                <form onSubmit={(e) => {
                  e.preventDefault();
                  if (tempImageUrl) {
                    let finalUrl = tempImageUrl;
                    const match = finalUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || finalUrl.match(/id=([a-zA-Z0-9_-]+)/) || finalUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                    if (match && match[1]) finalUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
                    setProfileImage(finalUrl);
                    fetchAPI({ action: 'saveProfileImage', imageUrl: finalUrl });
                  }
                  setShowImageModal(false);
                  setTempImageUrl('');
                }} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f5`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                  <h3 className="text-sm font-black mb-4 text-center" style={{ color: COLORS.textMain }}>เปลี่ยนรูปโปรไฟล์ 🐰</h3>
                  <div className="space-y-2">
                    <input type="url" required value={tempImageUrl} onChange={(e) => setTempImageUrl(e.target.value)} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all text-center" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#e5a9bf30', color: COLORS.textMain }} placeholder="วางลิงก์รูปภาพ Google Drive ที่นี่..." />
                    <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 shadow-lg active:scale-95 transition-all" style={{ backgroundColor: '#e5a9bf', color: '#241a22' }}>Save Image</button>
                    <button type="button" onClick={() => { setShowImageModal(false); setTempImageUrl(''); }} className="w-full text-[9px] font-bold mt-1 uppercase tracking-widest opacity-40" style={{ color: COLORS.textSoft }}>Close</button>
                  </div>
                </form>
              </div>
            )}

            {/* Modal: Banner */}
            {showBannerModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 backdrop-blur-[2px] animate-fadeIn" style={{ backgroundColor: '#241a2240' }}>
                <form onSubmit={(e) => {
                  e.preventDefault();
                  if (tempBannerUrl) {
                    let finalUrl = tempBannerUrl;
                    const match = finalUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || finalUrl.match(/id=([a-zA-Z0-9_-]+)/) || finalUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                    if (match && match[1]) finalUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
                    setBannerImage(finalUrl);
                    toggleBannerVisibility(true);
                    fetchAPI({ action: 'saveBannerImage', imageUrl: finalUrl });
                  }
                  setShowBannerModal(false);
                  setTempBannerUrl('');
                }} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f5`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                  <h3 className="text-sm font-black mb-4 text-center" style={{ color: COLORS.textMain }}>เปลี่ยนแบนเนอร์</h3>
                  <div className="space-y-2">
                    <input type="url" required value={tempBannerUrl} onChange={(e) => setTempBannerUrl(e.target.value)} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all text-center" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#e5a9bf30', color: COLORS.textMain }} placeholder="วางลิงก์รูปภาพ Google Drive..." />
                    <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 shadow-lg active:scale-95 transition-all" style={{ backgroundColor: '#fdd6dd', color: '#241a22' }}>Save Banner</button>
                    <button type="button" onClick={() => { setShowBannerModal(false); setTempBannerUrl(''); }} className="w-full text-[9px] font-bold mt-1 uppercase tracking-widest opacity-40" style={{ color: COLORS.textSoft }}>Close</button>
                  </div>
                </form>
              </div>
            )}

            {/* Modal: Confirm Delete */}
            {taskToDelete && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 backdrop-blur-[2px] animate-fadeIn" style={{ backgroundColor: '#241a2250' }}>
                <div className="backdrop-blur-xl w-full max-w-[260px] rounded-[30px] p-6 shadow-2xl animate-slideUp text-center" style={{ backgroundColor: `${COLORS.modalBg}f5`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                  <div className="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm" style={{ backgroundColor: '#e5a9bf20', color: '#e5a9bf', borderWidth: '1px', borderColor: '#e5a9bf40' }}>
                    <IconTrash size={26} />
                  </div>
                  <h3 className="text-[14px] font-black mb-1" style={{ color: COLORS.textMain }}>ยืนยันการลบ?</h3>
                  <p className="text-[10px] font-bold mb-5 opacity-60" style={{ color: COLORS.textSoft }}>คุณต้องการลบคิวงานนี้ใช่หรือไม่<br/>(ไม่สามารถกู้คืนได้)</p>
                  <div className="flex gap-2">
                    <button onClick={() => setTaskToDelete(null)} className="flex-1 py-3 rounded-2xl font-black text-[10px] active:scale-95 transition-all shadow-sm" style={{ color: COLORS.textSoft, backgroundColor: `${COLORS.cardInner}` }}>ยกเลิก</button>
                    <button onClick={executeDeleteTask} className="flex-1 py-3 rounded-2xl font-black text-[10px] active:scale-95 transition-all shadow-sm" style={{ backgroundColor: '#e5a9bf', color: '#241a22' }}>ลบข้อมูล</button>
                  </div>
                </div>
              </div>
            )}

          </div>

          <style>{`
            /* ── Orb drifting animations ── */
            @keyframes orb-1 {
              0%   { transform: translate(0px, 0px) scale(1); }
              25%  { transform: translate(40px, 30px) scale(1.08); }
              50%  { transform: translate(20px, 60px) scale(0.95); }
              75%  { transform: translate(-30px, 25px) scale(1.05); }
              100% { transform: translate(0px, 0px) scale(1); }
            }
            @keyframes orb-2 {
              0%   { transform: translate(0px, 0px) scale(1); }
              30%  { transform: translate(-50px, -40px) scale(1.1); }
              60%  { transform: translate(-20px, -70px) scale(0.9); }
              80%  { transform: translate(30px, -30px) scale(1.06); }
              100% { transform: translate(0px, 0px) scale(1); }
            }
            @keyframes orb-3 {
              0%   { transform: translate(0px, 0px) scale(1); opacity: 0.7; }
              33%  { transform: translate(35px, -45px) scale(1.15); opacity: 1; }
              66%  { transform: translate(-25px, 35px) scale(0.85); opacity: 0.6; }
              100% { transform: translate(0px, 0px) scale(1); opacity: 0.7; }
            }
            @keyframes orb-4 {
              0%   { transform: translate(0px, 0px); }
              40%  { transform: translate(-40px, 50px); }
              70%  { transform: translate(-60px, 20px); }
              100% { transform: translate(0px, 0px); }
            }
            @keyframes orb-5 {
              0%   { transform: translate(0px, 0px) scale(1); }
              50%  { transform: translate(45px, -35px) scale(1.12); }
              100% { transform: translate(0px, 0px) scale(1); }
            }
            @keyframes gradient-shift {
              0%   { background-position: 0% 50%; }
              50%  { background-position: 100% 50%; }
              100% { background-position: 0% 50%; }
            }
            @keyframes shimmer-sweep {
              0%   { background-position: -100% 0%; }
              100% { background-position: 200% 0%; }
            }
            @keyframes shine-sweep {
              0% { transform: translateX(-200%) skewX(-15deg); }
              100% { transform: translateX(300%) skewX(-15deg); }
            }

            .animate-orb-1 { animation: orb-1 18s ease-in-out infinite; }
            .animate-orb-2 { animation: orb-2 22s ease-in-out infinite; }
            .animate-orb-3 { animation: orb-3 16s ease-in-out infinite 3s; }
            .animate-orb-4 { animation: orb-4 25s ease-in-out infinite 5s; }
            .animate-orb-5 { animation: orb-5 20s ease-in-out infinite 1s; }
            .animate-gradient-shift { animation: gradient-shift 15s ease infinite; }
            .animate-shimmer-sweep { animation: shimmer-sweep 8s linear infinite; }
            .animate-shine-sweep { animation: shine-sweep 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

            /* ── UI animations ── */
            @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes float-particle-1 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-20px); opacity: 0; } }
            @keyframes float-particle-2 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-15px) translateX(5px); opacity: 0; } }
            @keyframes float-particle-3 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-25px) translateX(-5px); opacity: 0; } }
            @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
            @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes text-wave { 0%, 20%, 100% { transform: translateY(0px); } 10% { transform: translateY(-5px); } }
            @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

            .animate-text-wave { animation: text-wave 4s ease-in-out infinite; }
            .animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
            .animate-float-particle-1 { animation: float-particle-1 3s ease-out infinite; }
            .animate-float-particle-2 { animation: float-particle-2 4s ease-out infinite 1s; }
            .animate-float-particle-3 { animation: float-particle-3 3.5s ease-out infinite 0.5s; }
            .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
            .animate-slideUp { animation: slideUp 0.3s ease-out; }
            .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
            .animate-spin-slow { animation: spin-slow 4s linear infinite; }

            input::placeholder, textarea::placeholder { color: #e5a9bf50; }
            input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8) sepia(1) saturate(0.5) hue-rotate(290deg); }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
