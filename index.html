<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  
  <link rel="apple-touch-icon" href="https://em-content.zobj.net/source/apple/419/lemon_1f34b.png">
  <link rel="icon" sizes="192x192" href="https://em-content.zobj.net/source/apple/419/lemon_1f34b.png">
  <link rel="shortcut icon" href="https://em-content.zobj.net/source/apple/419/lemon_1f34b.png">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    // ==========================================
    // 🖼️ COMPONENTS: ไอคอน SVG ทั้งหมด
    // ==========================================
    const IconPlus = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconHome = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconSearch = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconClock = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconFileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconCalendar = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;

    const IconLoader = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;

    const IconEye = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const IconEyeOff = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
    const IconImage = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconList = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const IconChevronLeft = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const IconTrash = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconSmile = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>;
    const IconUser = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const IconEdit = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
    const IconGlobe = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>;
    const IconNotion = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M8 16V8l8 8V8"></path></svg>;
    const IconDrive = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 10l-6 10l-3 -5l6 -10z"></path><path d="M9 15h12l-3 5h-12z"></path><path d="M15 15l-6 -10h6l6 10z"></path></svg>;
    const IconAlert = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;

    // ==========================================
    // 🎨 ตัวแปรสีหลัก
    // ==========================================
    const COLORS = {
      blue: '#CCE9ED', pink: '#FFD2E4', purple: '#FFEEB1', orange: '#E7F098', bg: '#fcfcfc',
      white: '#ffffff', textMain: '#ff96d3', textSoft: '#b5e48c', pinkDeep: '#ff96d3',
      blueDeep: '#b5e48c', purpleDeep: '#ff96d3', orangeDeep: '#b5e48c', cardBg: '#ffffff',
      cardBgDone: '#FFD2E4', cardWhite: '#ffffff', cardBorder: '#f0f0f0', cardInner: '#ffffff',
      cloudWhite: '#ffffff', modalBg: '#ffffff', navBarBg: '#ffffff', profileBorder: '#ff96d3',
      buttonBg: '#ffffff', dividerColor: '#f3f4f6', bannerOverlayBg: '#ffffff',
    };

    const FluffyCloud = React.memo(({ top, left, right, bottom, scale = 1, opacity = 0.7, delay = '0s', reverse = false }) => (
      <div className="absolute pointer-events-none drop-shadow-sm z-0" style={{ top, left, right, bottom, opacity, transform: `scale(${scale})` }}>
        <div className={reverse ? 'animate-float-reverse' : 'animate-float'} style={{ animationDelay: delay }}>
          <div className="relative w-40 h-16">
            <div className="absolute bottom-0 left-4 w-32 h-10 rounded-full bg-white/90"></div>
            <div className="absolute bottom-2 left-2 w-14 h-14 rounded-full bg-white/90"></div>
            <div className="absolute bottom-5 left-10 w-16 h-16 rounded-full bg-white/90"></div>
            <div className="absolute bottom-1 right-2 w-14 h-14 rounded-full bg-white/90"></div>
          </div>
        </div>
      </div>
    ));

    const DynamicBackground = React.memo(() => (
      <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div className="absolute top-[10%] left-[-10%] w-72 h-72 rounded-full blur-[90px] opacity-40 animate-float" style={{ backgroundColor: COLORS.pink }}></div>
        <div className="absolute bottom-[10%] right-[-10%] w-80 h-80 rounded-full blur-[100px] opacity-30 animate-float-reverse" style={{ backgroundColor: COLORS.blue }}></div>
        <div className="absolute top-[40%] right-[10%] w-48 h-48 rounded-full blur-[80px] opacity-20 animate-float" style={{ backgroundColor: COLORS.purple }}></div>
        <FluffyCloud top="8%" left="-5%" scale={1.5} opacity={0.6} delay="0s" />
        <FluffyCloud top="35%" left="-15%" scale={2.5} opacity={0.3} delay="2.5s" />
        <FluffyCloud bottom="20%" left="5%" scale={1.6} opacity={0.6} delay="3s" />
        <FluffyCloud top="50%" right="-5%" scale={1.8} opacity={0.5} delay="1s" reverse={true} />
      </div>
    ));

    const Header = React.memo(({ isAdmin, setIsAdmin, setShowAuthModal, handleImageUpload, profileImage }) => (
      <div className="px-5 pt-6 pb-2 relative z-10">
        <div className="backdrop-blur-md rounded-[32px] p-4 shadow-xl flex items-center justify-between h-20 relative overflow-hidden group bg-white/60 border border-gray-100">
          <div className="absolute left-6 top-1/2 -translate-y-1/2 w-24 h-8 blur-xl rounded-full bg-[#ff96d3]/40"></div>
          <div className="flex flex-col justify-center ml-2 relative z-10">
            <div className="flex items-center gap-1">
             <h1 className="text-2xl font-black italic tracking-tighter flex">
             {"namtip".split('').map((char, index) => (
                <span key={index} className={`drop-shadow-sm inline-block animate-text-wave pb-2 ${char === ' ' ? 'w-2.5' : 'pr-[1.5px]'}`} style={{ animationDelay: `${index * 0.1}s`, color: '#ff96d3' }}>{char}</span>
              ))}
            </h1>
              <button onClick={() => isAdmin ? setIsAdmin(false) : setShowAuthModal(true)} className={`px-1.5 py-0.5 ml-1 rounded-full text-[7px] font-black uppercase tracking-widest border shadow-sm transition-all active:scale-95 bg-white`}>
                {isAdmin ? <span className="text-[#ff96d3]">Admin</span> : <span className="text-gray-400">Guest</span>}
              </button>
            </div>
            <div className="flex items-center gap-1.5 opacity-70">
              <div className="w-3 h-[1px] bg-[#ff96d3]"></div>
              <p className="text-[8px] font-black tracking-[0.5em] uppercase text-[#ff96d3]">Check Q</p>
            </div>
          </div>
          <div onClick={isAdmin ? handleImageUpload : undefined} className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center relative overflow-hidden bg-white border-2 border-[#ff96d3] ${isAdmin ? 'cursor-pointer hover:scale-105 transition-transform' : ''}`}>
            {profileImage ? <img src={profileImage} className="w-full h-full object-cover" /> : <span className="text-2xl">🐰</span>}
          </div>
        </div>
      </div>
    ));

    const ProgressFlower = React.memo(({ progress, todayTasksLength, doneToday, triggerFlowerBounce, isBouncing }) => {
      const bloomScale = Math.max(0.2, progress / 100);
      const isFullBloom = progress === 100 && todayTasksLength > 0;
      const petals = [0, 72, 144, 216, 288].map(angle => {
        const rad = (angle * Math.PI) / 180;
        return { cx: 50 + 15 * Math.sin(rad), cy: 50 - 15 * Math.cos(rad), r: 18 };
      });

      return (
        <div onClick={triggerFlowerBounce} className={`backdrop-blur-sm rounded-[28px] p-3 flex flex-col items-center justify-center shadow-lg h-full relative overflow-hidden transition-all duration-300 cursor-pointer bg-white/80 border border-gray-100 ${isBouncing ? 'scale-95' : 'hover:scale-[1.02]'}`}>
          <div className="absolute top-2 left-3 text-[8px] font-black text-[#ff96d3] uppercase tracking-tighter opacity-70">ความสำเร็จวันนี้</div>
          <div className="relative w-full h-20 flex items-center justify-center mt-2">
            <svg viewBox="0 0 100 100" className="w-20 h-20 overflow-visible">
              <g transform="translate(50, 50)">
                  <g className="animate-breathe">
                    <g transform={`scale(${bloomScale})`} className="transition-transform duration-1000">
                      <g transform="translate(-50, -50)">
                        {petals.map((p, i) => <circle key={i} cx={p.cx} cy={p.cy} r={p.r} fill="#FFD2E4" opacity="0.95" className="transition-all duration-700"/>)}
                        <circle cx="50" cy="50" r="14" fill="#FFEEB1" className="transition-all duration-700" />
                        {isFullBloom && (
                          <g transform="translate(50, 50)" className="animate-fade-in">
                            <path d="M -5 -1 Q -3 -3 -1 -1" fill="none" stroke="#ff96d3" strokeWidth="1.2" strokeLinecap="round" />
                            <path d="M 1 -1 Q 3 -3 5 -1" fill="none" stroke="#ff96d3" strokeWidth="1.2" strokeLinecap="round" />
                            <path d="M -1.5 2 Q 0 4 1.5 2" fill="none" stroke="#ff96d3" strokeWidth="1.2" strokeLinecap="round" />
                            <ellipse cx="-6" cy="1" rx="1.5" ry="1" fill="#ff96d3" opacity="0.6"/>
                            <ellipse cx="6" cy="1" rx="1.5" ry="1" fill="#ff96d3" opacity="0.6"/>
                          </g>
                        )}
                      </g>
                    </g>
                  </g>
              </g>
            </svg>
          </div>
          <div className="mt-1 flex items-center gap-1 px-2 py-0.5 rounded-full z-10 bg-white/90 border border-[#ff96d3]">
            <span className="text-xs font-black text-[#ff96d3]">{progress}%</span>
            <div className="w-1 h-1 rounded-full bg-[#FFD2E4]"></div>
            <span className="text-[8px] font-bold text-gray-400 uppercase">{doneToday} / {todayTasksLength} งาน</span>
          </div>
        </div>
      );
    });

    const CompactStats = React.memo(({ isAdmin, selectedNextDate, nextQueueDate, handleSetManualDate, waitingCount }) => (
      <div className="backdrop-blur-sm rounded-[28px] p-1 shadow-lg h-full flex overflow-hidden relative group transition-all bg-white/80 border border-gray-100">
          <div className={`flex-1 flex flex-col justify-center items-center p-2 relative rounded-l-[24px] transition-colors overflow-hidden bg-[#E7F098]/40 ${isAdmin ? 'hover:bg-white/50 cursor-pointer' : ''}`}>
            {isAdmin && <input type="date" className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10" value={selectedNextDate || nextQueueDate} onChange={(e) => handleSetManualDate(e.target.value)} />}
            <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-md text-[7px] font-black shadow-sm border uppercase tracking-wider whitespace-nowrap text-[#b5e48c] bg-white border-[#E7F098]">NEXT QUEUE</div>
            <div className="flex flex-col items-center mt-1 relative z-0 pointer-events-none">
              <span className="text-3xl font-black leading-none tracking-tighter text-[#b5e48c]">{new Date(nextQueueDate).getDate()}</span>
              <span className="text-[8px] font-black opacity-80 uppercase mt-0.5 text-[#b5e48c]">{new Date(nextQueueDate).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</span>
            </div>
            {isAdmin && selectedNextDate && (
              <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleSetManualDate(''); }} className="absolute bottom-1.5 left-1/2 -translate-x-1/2 z-20 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm border hover:bg-[#fff9f9] active:scale-90 transition-all text-[#ff96d3] bg-white border-[#ff96d3]">AUTO</button>
            )}
          </div>
          <div className="my-4 rounded-full w-[1px] bg-gray-100"></div>
          <div className="flex-1 flex flex-col justify-center items-center p-2 relative">
            <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm border uppercase tracking-wider whitespace-nowrap z-10 text-[#ff96d3] bg-white border-[#ff96d3]">จำนวนคิว</div>
            <div className="relative mt-5 flex flex-col items-center">
               <div className="relative">
                 <div className="absolute inset-0 blur-lg rounded-full opacity-40 scale-125 bg-[#CCE9ED]"></div>
                 <div className="w-11 h-11 rounded-full flex flex-col items-center justify-center relative z-10 bg-white border-2 border-[#CCE9ED]">
                    <span className="text-xl font-black leading-none text-[#ff96d3]">{waitingCount}</span>
                 </div>
               </div>
               <span className="text-[8px] font-black opacity-60 uppercase mt-1.5 relative z-10 text-[#ff96d3]">คิว</span>
            </div>
          </div>
      </div>
    ));

    const TaskCard = React.memo(({ task, isAdmin, onEdit, onToggleDoing, onToggleStatus }) => (
      <div onClick={() => isAdmin && onEdit(task)} className={`relative mb-2 rounded-[22px] p-3 transition-all shadow-sm group backdrop-blur-sm ${isAdmin ? 'active:scale-[0.97] cursor-pointer' : ''}`} style={{ backgroundColor: task.status === 'done' ? '#FFD2E4' : '#ffffff', borderWidth: '1px', borderColor: task.status === 'doing' ? '#ff96d3' : (task.status === 'done' ? 'transparent' : '#f0f0f0'), opacity: task.status === 'done' ? 0.9 : 1 }}>
        {task.status === 'doing' && (
           <div className="absolute inset-0 pointer-events-none z-0">
             <div className="absolute -bottom-2 -left-3 text-[14px] animate-float-particle-1 drop-shadow-sm">🍋</div>
             <div className="absolute top-[30%] -left-4 text-[10px] animate-float-particle-3 drop-shadow-sm" style={{ animationDelay: '1.5s' }}>🍋</div>
             <div className="absolute -bottom-2 -right-3 text-[14px] animate-float-particle-2 drop-shadow-sm" style={{ animationDelay: '0.5s' }}>🍋</div>
             <div className="absolute top-[30%] -right-4 text-[10px] animate-float-particle-1 drop-shadow-sm" style={{ animationDelay: '1.2s' }}>🍋</div>
           </div>
        )}
        <div className="absolute left-2 top-3 bottom-3 w-1 rounded-full shadow-sm z-10" style={{ backgroundColor: task.channel === 'LINE' ? '#D5EDB5' : task.channel === 'FB' || task.channel === 'FACEBOOK' ? '#C0D5E9' : task.channel === 'IG' ? '#FFD3DE' : '#ff96d3' }}></div>
        <div className="pl-3 pr-1 relative z-10">
          <div className="flex justify-between items-start mb-1">
            <div className="flex items-center gap-2 min-w-0">
              <span className="font-bold text-base truncate" style={{ color: '#ff96d3' }}>{task.client}</span>
              {task.priority === 'urgent' && <span className="text-[9px] font-bold animate-pulse px-2 py-0.5 rounded-full shadow-sm border bg-white border-[#ff96d3] text-[#ff96d3]">{'\u{1F525}'} ด่วน</span>}
              {task.priority === 'very_urgent' && <span className="text-[9px] font-bold animate-pulse px-2 py-0.5 rounded-full shadow-sm border bg-white border-[#ff96d3] text-[#ff96d3]">{'\u{1F525}'} ด่วนมาก</span>}
            </div>
            <div className="flex items-center gap-1 text-[9px] font-black bg-[#fff9f9]/80 px-2.5 py-0.5 rounded-lg border shadow-sm text-[#ff96d3] border-[#ff96d3]">
                <IconCalendar size={11} />
                {task.deadline ? (() => { const parts = task.deadline.toString().substring(0, 10).split('-'); if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0].substring(2)}`; return task.deadline; })() : ''}
            </div>
          </div>
          <div className="flex justify-between items-end mt-1">
            <div className="flex-1 min-w-0 mr-4 flex flex-col gap-0.5 mt-1">
              <div className="flex items-center gap-1.5">
                <span className={`text-[11px] font-black truncate ${task.status === 'done' ? 'line-through text-[#ff96d3]/60' : 'text-[#b5e48c]'}`}>{task.type}</span>
                {task.recurringType && task.recurringType !== 'none' && <span className="text-[8px] bg-gray-50 border border-gray-100 text-gray-400 px-1.5 rounded-md">{task.recurringType === 'weekly' ? 'ทุกสัปดาห์' : 'ทุกเดือน'}</span>}
              </div>
              {task.time_period && <span className={`text-[10px] flex items-center gap-1 mt-0.5 ${task.status === 'done' ? 'text-[#ff96d3]/80' : 'text-gray-500'}`}><IconClock size={10} /> {task.time_period}</span>}
              {task.channel && <span className={`text-[10px] truncate ${task.status === 'done' ? 'text-[#ff96d3]/80' : 'text-gray-500'}`}><span className="font-bold">Link:</span> {task.channel}</span>}
              {task.details && <span className={`text-[10px] leading-tight line-clamp-2 mt-0.5 ${task.status === 'done' ? 'text-[#ff96d3]/80' : 'text-gray-500'}`}><span className="font-bold">สถานที่:</span> {task.details}</span>}
            </div>
            {isAdmin ? (
              <div className="flex gap-1.5 shrink-0">
                <button onClick={(e) => onToggleDoing(e, task.id)} className={`relative w-[28px] h-[28px] rounded-[8px] flex items-center justify-center transition-all active:scale-90 shadow-[0_3px_10px_rgba(255,210,228,1)] ${task.status === 'doing' ? 'bg-[#fff9f9] text-[#b5e48c]' : 'bg-white text-gray-300'}`} style={{ borderWidth: '2px', borderColor: '#f0f0f0' }}>
                  <div className={`${task.status === 'doing' ? 'animate-spin-slow' : ''} flex items-center justify-center`}><IconLoader size={14} /></div>
                </button>
                <button onClick={(e) => onToggleStatus(e, task.id)} className={`relative w-[28px] h-[28px] rounded-[8px] flex items-center justify-center transition-all active:scale-90 shadow-[0_3px_10px_rgba(255,210,228,1)] ${task.status === 'done' ? 'bg-[#fff9f9] text-[#ff96d3]' : 'bg-white text-gray-300'}`} style={{ borderWidth: '2px', borderColor: '#f0f0f0' }}>
                  <IconCheck size={16} />
                </button>
              </div>
            ) : (
              <div className="flex items-center shrink-0">
                {task.status === 'doing' && <span className="text-[10px] font-bold flex items-center gap-1 px-2 py-1 rounded-md border shadow-sm text-[#b5e48c] bg-[#fff9f9] border-[#ff96d3]"><IconLoader size={10} className="animate-spin-slow"/> กำลังทำ</span>}
                {task.status === 'done' && <span className="text-[10px] font-bold flex items-center gap-1 px-2 py-1 rounded-md border shadow-sm text-[#ff96d3] bg-white border-[#ff96d3]"><IconCheck size={10} /> เสร็จแล้ว</span>}
                {task.status === 'todo' && <span className="text-[10px] font-bold text-gray-400 flex items-center gap-1 px-2 py-1 rounded-md border border-gray-100 shadow-sm bg-white"><IconClock size={10} /> รอคิว</span>}
              </div>
            )}
          </div>
        </div>
      </div>
    ));

    const isTaskOnDate = (task, dateStr) => {
        if (!task.deadline) return false;
        const taskDate = new Date(task.deadline);
        const checkDate = new Date(dateStr);
        const taskDateStr = task.deadline.toString().substring(0, 10);
        if (taskDateStr === dateStr) return true;
        if (checkDate < taskDate) return false;
        if (task.recurringType === 'weekly' && task.recurringValue) {
            const days = task.recurringValue.split(',').map(Number);
            return days.includes(checkDate.getDay());
        }
        if (task.recurringType === 'monthly' && task.recurringValue) {
            const val = task.recurringValue.trim();
            const cd = checkDate.getDate();
            if (val.includes('-')) {
                const parts = val.split('-').map(Number);
                if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                    if (parts[0] > parts[1]) return cd >= parts[0] || cd <= parts[1];
                    else return cd >= parts[0] && cd <= parts[1];
                }
            } else {
                if(!isNaN(Number(val))) return cd === Number(val);
            }
        }
        return false;
    };

    const CalendarView = React.memo(({ currentMonth, setCurrentMonth, selectedDate, setSelectedDate, today, tasks }) => {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);
      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      return (
        <div className="backdrop-blur-xl rounded-[32px] p-5 mb-5 animate-fadeIn shadow-sm bg-white/90 border border-gray-100">
          <div className="flex justify-between items-center mb-4 px-2">
            <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))} className="p-1.5 rounded-full transition-colors text-[#b5e48c]"><IconChevronLeft size={20}/></button>
            <h3 className="font-black text-[16px] tracking-widest text-[#ff96d3]">{monthNames[month]} {year}</h3>
            <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))} className="p-1.5 rounded-full transition-colors text-[#b5e48c]"><IconChevronRight size={20}/></button>
          </div>
          <div className="grid grid-cols-7 gap-1 text-center mb-3">
            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
              <div key={d} className="text-[9px] font-black opacity-60 uppercase text-[#b5e48c]">{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-y-3 gap-x-1 text-center">
            {days.map((day, index) => {
              if (!day) return <div key={`empty-${index}`} className="h-10"></div>;
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const isSelected = selectedDate === dateStr;
              const isToday = today === dateStr;
              const hasTasks = tasks.some(t => isTaskOnDate(t, dateStr));
              return (
                <div key={dateStr} className="flex justify-center items-center h-10">
                  <div onClick={() => setSelectedDate(dateStr)} className={`relative w-10 h-10 flex flex-col items-center justify-center cursor-pointer transition-all ${isSelected ? 'text-white rounded-full font-black shadow-md scale-105 bg-[#ff96d3]' : isToday ? 'font-black rounded-full text-[#ff96d3] border-2 border-[#ff96d3]' : 'font-bold hover:bg-[#fff9f9] hover:shadow-sm rounded-full text-[#b5e48c]'}`}>
                    <span className="text-[13px] z-10 leading-none">{day}</span>
                    {hasTasks && <div className={`absolute bottom-1 w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-[#ff96d3]'}`}></div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    });

    const formatSystemImage = (url) => {
        if (!url) return '';
        const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/) || url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}`;
        return url;
    };

    const formatStudentFile = (val, isPdf) => {
        if (!val) return '';
        if (isPdf === true) {
            if (val.indexOf('/') !== -1) return val;
            return 'https://drive.google.com/file/d/' + val + '/view';
        }
        const match = val.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || val.match(/id=([a-zA-Z0-9_-]+)/) || val.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}`;
        if (val.indexOf('/') === -1) return `https://lh3.googleusercontent.com/d/${val}`;
        return val;
    };

    const CustomConfirmModal = ({ isOpen, title, message, onCancel, onConfirm }) => {
        if (!isOpen) return null;
        return (
            <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm animate-fadeIn">
                <div className="backdrop-blur-xl w-full max-w-[280px] rounded-[30px] p-6 shadow-2xl animate-slideUp bg-white/95 border border-gray-100 text-center">
                    <div className="w-14 h-14 rounded-full bg-red-50 text-red-400 flex items-center justify-center mx-auto mb-4 shadow-sm border border-red-100"><IconAlert size={26} /></div>
                    <h3 className="text-[16px] font-black mb-1 text-gray-800">{title}</h3>
                    <p className="text-[11px] font-bold text-gray-500 mb-6 leading-relaxed">{message}</p>
                    <div className="flex gap-2">
                        <button onClick={onCancel} className="flex-1 py-3.5 rounded-2xl font-black text-[11px] text-gray-500 bg-gray-100 hover:bg-gray-200 active:scale-95 shadow-sm transition-all">ยกเลิก</button>
                        <button onClick={onConfirm} className="flex-1 py-3.5 rounded-2xl font-black text-[11px] text-white bg-red-400 hover:bg-red-500 active:scale-95 shadow-sm transition-all">ยืนยัน</button>
                    </div>
                </div>
            </div>
        );
    };

    const CustomPromptModal = ({ isOpen, title, placeholder, initialValue, onCancel, onConfirm }) => {
        const [val, setVal] = useState('');
        useEffect(() => { if(isOpen) setVal(initialValue || '') }, [isOpen, initialValue]);
        if (!isOpen) return null;
        return (
            <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm animate-fadeIn">
                <div className="backdrop-blur-xl w-full max-w-[280px] rounded-[30px] p-6 shadow-2xl animate-slideUp bg-white/95 border border-gray-100">
                    <h3 className="text-[14px] font-black mb-4 text-[#ff96d3] text-center">{title}</h3>
                    <input autoFocus type="text" value={val} onChange={(e) => setVal(e.target.value)} placeholder={placeholder} className="w-full p-3.5 rounded-2xl border border-gray-100 outline-none text-[12px] font-bold text-gray-600 shadow-sm focus:border-[#ff96d3] text-center mb-5" />
                    <div className="flex gap-2">
                        <button onClick={onCancel} className="flex-1 py-3.5 rounded-2xl font-black text-[11px] text-gray-500 bg-gray-100 hover:bg-gray-200 active:scale-95 shadow-sm transition-all">ยกเลิก</button>
                        <button onClick={() => onConfirm(val)} className="flex-[1.5] py-3.5 rounded-2xl font-black text-[11px] text-white bg-[#ff96d3] hover:bg-[#ff85c8] active:scale-95 shadow-sm transition-all">บันทึก</button>
                    </div>
                </div>
            </div>
        );
    };

    // ==========================================
    // 🏠 MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [isSaving, setIsSaving] = useState(false);
      const [tasks, setTasks] = useState([]);
      const [students, setStudents] = useState([]);
      const [todos, setTodos] = useState([]);
      const [view, setView] = useState('dashboard');
      const [isCalendarView, setIsCalendarView] = useState(false);
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(() => {
        const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      });
      const [filterType, setFilterType] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [showModal, setShowModal] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', action: null });
      const [promptModal, setPromptModal] = useState({ isOpen: false, type: '', title: '', placeholder: '', value: '' });
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [showImageModal, setShowImageModal] = useState(false);
      const [showBannerModal, setShowBannerModal] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [password, setPassword] = useState('');
      const [authError, setAuthError] = useState(false);
      const [isVerifyingAuth, setIsVerifyingAuth] = useState(false);
      const [showEmojiModal, setShowEmojiModal] = useState(false);
      const [tempEmoji, setTempEmoji] = useState('');
      const [noteText, setNoteText] = useState('');
      const [noteEmoji, setNoteEmoji] = useState('😊');
      const [dashboardImageUrl, setDashboardImageUrl] = useState('');
      const [newTodoText, setNewTodoText] = useState('');
      const [studentSubView, setStudentSubView] = useState('list');
      const [studentSearchQuery, setStudentSearchQuery] = useState('');
      const [editingStudent, setEditingStudent] = useState(null);
      const [viewingStudent, setViewingStudent] = useState(null);
      const [recType, setRecType] = useState('none');
      const [recVal, setRecVal] = useState('');
      const [profileImage, setProfileImage] = useState(null);
      const [tempImageUrl, setTempImageUrl] = useState('');
      const [bannerImage, setBannerImage] = useState(null);
      const [tempBannerUrl, setTempBannerUrl] = useState('');
      const [isBannerVisible, setIsBannerVisible] = useState(true);
      const [selectedNextDate, setSelectedNextDate] = useState('');
      const [isBouncing, setIsBouncing] = useState(false);
      const [linkNotion, setLinkNotion] = useState('https://notion.so');
      const [linkWebsite, setLinkWebsite] = useState('https://google.com');
      const [linkDrive, setLinkDrive] = useState('https://drive.google.com');
      const [taskTypes, setTaskTypes] = useState(['Logo', 'Banner', 'Artwork']);

      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwm6VdTr6uZEl22yk9r7tCrpQWqQh6WGT_73AMQHocCYIYb_9obVuqYWGXMiQwAiBCc7Q/exec";

      const fetchAPI = async (payload) => {
        try {
          const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
          return await res.json();
        } catch (error) { console.error("API Error:", error); throw error; }
      };

      useEffect(() => {
        document.title = "namtip";
        fetchAPI({ action: 'getInitialData' }).then(response => {
            if (response.status === 'success') {
              if (response.data.tasks) setTasks(response.data.tasks);
              if (response.data.students) setStudents(response.data.students);
              if (response.data.todos) setTodos(response.data.todos);
              if (response.data.taskTypes) setTaskTypes(response.data.taskTypes);
              if (response.data.settings) {
                 const s = response.data.settings;
                 if (s.profileImage) setProfileImage(formatSystemImage(s.profileImage));
                 if (s.bannerImage) setBannerImage(formatSystemImage(s.bannerImage));
                 if (s.bannerVisible !== undefined) setIsBannerVisible(s.bannerVisible === 'true' || s.bannerVisible === true);
                 if (s.lockedNextDate) setSelectedNextDate(s.lockedNextDate);
                 if (s.linkNotion) setLinkNotion(s.linkNotion);
                 if (s.linkWebsite) setLinkWebsite(s.linkWebsite);
                 if (s.linkDrive) setLinkDrive(s.linkDrive);
                 if (s.noteText) setNoteText(s.noteText);
                 if (s.noteEmoji) setNoteEmoji(s.noteEmoji);
                 if (s.dashboardImageUrl) setDashboardImageUrl(formatSystemImage(s.dashboardImageUrl));
              }
            }
            setIsLoading(false);
        }).catch(() => setIsLoading(false));
      }, []);

      const handleAdminLogin = (e) => {
        e.preventDefault(); setIsVerifyingAuth(true); setAuthError(false);
        fetchAPI({ action: 'verifyAdminPassword', inputPassword: password }).then(res => {
            setIsVerifyingAuth(false);
            if (res.isValid) { setIsAdmin(true); setShowAuthModal(false); setPassword(''); setAuthError(false); }
            else setAuthError(true);
        }).catch(() => { setIsVerifyingAuth(false); setAuthError(true); });
      };

      const handleSetManualDate = useCallback((dateVal) => {
        setSelectedNextDate(dateVal);
        fetchAPI({ action: 'saveSetting', key: 'lockedNextDate', value: dateVal });
      }, []);

      const today = useMemo(() => {
        const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }, []);

      const todayTasks = useMemo(() => tasks.filter(t => isTaskOnDate(t, today)), [tasks, today]);
      const doneToday = useMemo(() => todayTasks.filter(t => t.status === 'done').length, [todayTasks]);
      const progress = todayTasks.length === 0 ? 0 : Math.round((doneToday / todayTasks.length) * 100);
      const pinnedTasks = useMemo(() => tasks.filter(t => t.isPinned), [tasks]);
      const nextQueueDate = useMemo(() => {
        if (selectedNextDate) return selectedNextDate;
        let checkDate = new Date();
        for (let i = 0; i < 365; i++) {
          const dateStr = `${checkDate.getFullYear()}-${String(checkDate.getMonth() + 1).padStart(2, '0')}-${String(checkDate.getDate()).padStart(2, '0')}`;
          if (tasks.filter(t => isTaskOnDate(t, dateStr)).length === 0) return dateStr;
          checkDate.setDate(checkDate.getDate() + 1);
        }
        return today;
      }, [tasks, selectedNextDate]);

      const waitingCount = useMemo(() => tasks.filter(t => t.status !== 'done').length, [tasks]);

      const toggleStatus = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(t => {
            if (t.id === id) {
              const newStatus = t.status === 'done' ? 'todo' : 'done';
              fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus });
              return { ...t, status: newStatus };
            }
            return t;
        }));
      }, []);

      const toggleDoing = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(t => {
            if (t.id === id) {
              const newStatus = t.status === 'doing' ? 'todo' : 'doing';
              fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus });
              return { ...t, status: newStatus };
            }
            return t;
        }));
      }, []);

      const openTaskModal = (task = null) => {
          setEditingTask(task);
          setRecType(task?.recurringType || 'none');
          setRecVal(task?.recurringValue || '');
          setShowModal(true);
      };

      const toggleWeeklyDay = (dayVal) => {
          let days = recVal ? recVal.split(',').map(Number) : [];
          if (days.includes(dayVal)) days = days.filter(d => d !== dayVal);
          else days.push(dayVal);
          setRecVal(days.sort().join(','));
      };

      const handleSaveTask = (e) => {
        e.preventDefault(); setIsSaving(true);
        const fd = new FormData(e.target);
        let finalTimePeriod = '';
        if (fd.get('time_start') && fd.get('time_end')) finalTimePeriod = `${fd.get('time_start')} - ${fd.get('time_end')}`;
        else finalTimePeriod = fd.get('time_start') || fd.get('time_end') || '';
        const taskData = {
          id: editingTask ? editingTask.id : null,
          client: fd.get('client'), type: fd.get('type'), channel: fd.get('channel'),
          priority: fd.get('priority') || 'normal', deadline: fd.get('deadline'),
          details: fd.get('details'), time_period: finalTimePeriod,
          recurringType: recType, recurringValue: recType === 'none' ? '' : recVal,
          isPinned: fd.get('isPinned') === 'on'
        };
        fetchAPI({ action: 'saveOrUpdateTask', task: taskData }).then(res => {
             if (res.status === 'success') setTasks(prev => editingTask ? prev.map(t => t.id === res.task.id ? res.task : t) : [...prev, res.task]);
             setIsSaving(false); setShowModal(false); setEditingTask(null);
        }).catch(() => setIsSaving(false));
      };

      const triggerDeleteTask = (id) => {
          setConfirmModal({
              isOpen: true, title: 'ลบคิวงาน', message: 'คุณต้องการลบคิวงานนี้ใช่หรือไม่?',
              action: () => {
                  setTasks(prev => prev.filter(t => t.id !== id));
                  fetchAPI({ action: 'deleteTask', taskId: id });
                  setConfirmModal({ isOpen: false });
                  setShowModal(false);
              }
          });
      };

      const toBase64 = file => new Promise((resolve, reject) => {
          const reader = new FileReader(); reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error);
      });

      const handleSaveStudent = async (e) => {
        e.preventDefault(); setIsSaving(true);
        const fd = new FormData(e.target);
        const student = {
            id: editingStudent ? editingStudent.id : null,
            fullname: fd.get('fullname'), nickname: fd.get('nickname'), birthdate: fd.get('birthdate'),
            father_name: fd.get('father_name'), father_occ: fd.get('father_occ'),
            mother_name: fd.get('mother_name'), mother_occ: fd.get('mother_occ'),
            phone: fd.get('phone'), address: fd.get('address'), extra_link: fd.get('extra_link'),
            photo_link: editingStudent ? editingStudent.photo_link : '',
            pdf_link: editingStudent ? editingStudent.pdf_link : ''
        };
        const photoFile = fd.get('photoFile');
        if(photoFile && photoFile.size > 0) student.photoBase64 = await toBase64(photoFile);
        const pdfFile = fd.get('pdfFile');
        if(pdfFile && pdfFile.size > 0) student.pdfBase64 = await toBase64(pdfFile);
        fetchAPI({action: 'saveStudent', student}).then(res => {
            setIsSaving(false);
            if(res.status === 'success') {
                if(editingStudent) setStudents(students.map(s => s.id === res.student.id ? res.student : s));
                else setStudents([...students, res.student]);
                setStudentSubView('list'); setEditingStudent(null);
            }
        });
      };

      const triggerDeleteStudent = (id) => {
          setConfirmModal({
              isOpen: true, title: 'ลบประวัตินักเรียน', message: 'คุณแน่ใจหรือไม่ว่าจะลบข้อมูลเด็กคนนี้?',
              action: () => {
                  setStudents(students.filter(s => s.id !== id));
                  fetchAPI({action: 'deleteStudent', studentId: id});
                  setConfirmModal({ isOpen: false });
              }
          });
      };

      const handleAddTodo = (e) => {
          if (e.key === 'Enter' && newTodoText.trim() !== '') {
              const text = newTodoText.trim(); setNewTodoText('');
              const tempId = Date.now().toString();
              setTodos([...todos, {id: tempId, text: text, isDone: false}]);
              fetchAPI({action:'saveTodo', todo: {text}}).then(res => {
                  if(res.status === 'success') setTodos(prev => prev.map(t => t.id === tempId ? res.todo : t));
              });
          }
      };
      const handleToggleTodo = (id, isDone) => {
          setTodos(todos.map(t => t.id === id ? {...t, isDone} : t));
          fetchAPI({action:'toggleTodo', todoId: id, isDone});
      };
      const triggerDeleteTodo = (id) => {
          setConfirmModal({
              isOpen: true, title: 'ลบรายการเช็คลิสต์', message: 'ต้องการลบรายการนี้ใช่ไหม?',
              action: () => {
                  setTodos(todos.filter(t => t.id !== id));
                  fetchAPI({action:'deleteTodo', todoId: id});
                  setConfirmModal({ isOpen: false });
              }
          });
      };

      const toggleBannerVisibility = (visible) => { setIsBannerVisible(visible); fetchAPI({ action: 'saveSetting', key: 'bannerVisible', value: visible }); };
      const triggerFlowerBounce = useCallback(() => { setIsBouncing(true); setTimeout(() => setIsBouncing(false), 500); }, []);
      const handleImageUpload = useCallback(() => { setShowImageModal(true); }, []);

      const openDashboardImgPrompt = () => {
          setPromptModal({ isOpen: true, type: 'dashImg', title: 'เปลี่ยนรูปหน้าหลัก 🖼️', placeholder: 'วางลิงก์ Google Drive...', value: dashboardImageUrl });
      };

      const handlePromptSave = (val) => {
          if (promptModal.type === 'dashImg') {
              const f = formatSystemImage(val); setDashboardImageUrl(f); fetchAPI({action:'saveSetting', key:'dashboardImageUrl', value:f});
          }
          setPromptModal({ ...promptModal, isOpen: false });
      };

      const filteredAllTasks = useMemo(() => tasks.filter(t => {
        const matchSearch = (t.type||'').toLowerCase().includes(searchQuery.toLowerCase()) || (t.client||'').toLowerCase().includes(searchQuery.toLowerCase());
        const matchFilter = filterType === 'all' || (filterType === 'pending' && t.status !== 'done') || (filterType === 'done' && t.status === 'done');
        return matchSearch && matchFilter;
      }), [tasks, searchQuery, filterType]);
      const displayedTasks = isCalendarView ? filteredAllTasks.filter(t => isTaskOnDate(t, selectedDate)) : filteredAllTasks;

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center relative overflow-hidden" style={{ backgroundColor: COLORS.bg }}>
             <DynamicBackground />
             <div className="flex flex-col items-center z-10 animate-breathe">
               <div className="flex items-center gap-1.5 px-6 py-2.5 backdrop-blur-sm rounded-full shadow-sm" style={{ backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                 <p className="text-[12px] font-black tracking-widest" style={{ color: COLORS.textMain }}>กำลังโหลดข้อมูล</p>
                 <div className="flex gap-1 pt-1 ml-1">
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: COLORS.pinkDeep, animationDelay: '0s' }}></span>
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: COLORS.blueDeep, animationDelay: '0.15s' }}></span>
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: COLORS.purpleDeep, animationDelay: '0.3s' }}></span>
                 </div>
               </div>
             </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen font-sans relative" style={{ backgroundColor: COLORS.bg, color: COLORS.textMain }}>
          <DynamicBackground />
          <div className="max-w-md mx-auto min-h-screen relative pb-28">
            <Header isAdmin={isAdmin} setIsAdmin={setIsAdmin} setShowAuthModal={setShowAuthModal} handleImageUpload={handleImageUpload} profileImage={profileImage} />

            {view !== 'students' && (
              <div className="px-5 relative z-10 mb-4">
                 {bannerImage && isBannerVisible && (
                   <div className="relative group w-full h-32 rounded-[24px] overflow-hidden shadow-sm backdrop-blur-sm" style={{ borderWidth: '1px', borderColor: COLORS.cardBorder, backgroundColor: `${COLORS.cardWhite}66` }}>
                      <img src={bannerImage} className="w-full h-full object-cover" />
                      <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                         {isAdmin && ( <button onClick={() => setShowBannerModal(true)} className="p-1.5 backdrop-blur-md rounded-full shadow-sm text-gray-500 transition-colors" style={{ backgroundColor: `${COLORS.bannerOverlayBg}e6`}}><IconImage size={16} /></button> )}
                         {isAdmin && ( <button onClick={() => toggleBannerVisibility(false)} className="p-1.5 backdrop-blur-md rounded-full shadow-sm text-gray-500 transition-colors" style={{ backgroundColor: `${COLORS.bannerOverlayBg}e6`}}><IconEyeOff size={16} /></button> )}
                      </div>
                   </div>
                 )}
                 {bannerImage && !isBannerVisible && isAdmin && (
                   <div className="flex justify-end mb-1">
                      <button onClick={() => toggleBannerVisibility(true)} className="text-[10px] font-bold flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full shadow-sm hover:opacity-80 transition-colors" style={{ color: COLORS.textSoft, backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '1px', borderColor: COLORS.cardBorder }}><IconEye size={12} /> แสดงแบนเนอร์</button>
                   </div>
                 )}
                 {!bannerImage && isAdmin && (
                   <div onClick={() => setShowBannerModal(true)} className="w-full h-16 rounded-[24px] border border-dashed backdrop-blur-sm flex items-center justify-center cursor-pointer hover:opacity-80 transition-colors" style={{ borderColor: COLORS.pinkDeep, backgroundColor: `${COLORS.cardWhite}66` }}>
                      <span className="text-[11px] font-bold flex items-center gap-2" style={{ color: COLORS.textSoft }}><IconPlus size={16}/> เพิ่มรูปแบนเนอร์ร้าน</span>
                   </div>
                 )}
              </div>
            )}

            <div className="px-5 relative z-10">

              {view === 'dashboard' ? (
                <div className="animate-fadeIn">
                  <div className="flex gap-3 mb-1.5 items-stretch">
                    <div className="flex-[1.6] flex flex-col gap-2">
                      <div className="h-28"><CompactStats isAdmin={isAdmin} selectedNextDate={selectedNextDate} nextQueueDate={nextQueueDate} handleSetManualDate={handleSetManualDate} waitingCount={waitingCount} /></div>

                      <div className="relative flex items-center w-full mt-0.5">
                        <input type="text" placeholder="เพิ่มโน้ตสั้นๆ..." className="w-full h-[40px] rounded-[16px] pl-3 pr-10 text-[11px] font-bold text-gray-600 outline-none shadow-sm transition-all border border-gray-100 focus:border-[#ff96d3] bg-white/90 backdrop-blur-sm"
                          value={noteText} onChange={(e) => setNoteText(e.target.value)} onBlur={(e) => fetchAPI({action:'saveSetting', key:'noteText', value:e.target.value})} disabled={!isAdmin} />

                        {/* ✅ Emoji Button — เปิด modal พิมพ์เอง */}
                        <div className="absolute right-1.5">
                          {isAdmin ? (
                            <button
                              type="button"
                              onClick={() => { setTempEmoji(''); setShowEmojiModal(true); }}
                              className="h-[28px] w-[28px] rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors"
                            >
                              <span className="text-sm select-none">{noteEmoji || '😊'}</span>
                            </button>
                          ) : (
                            <div className="h-[28px] w-[28px] flex items-center justify-center">
                              <span className="text-sm select-none">{noteEmoji || '😊'}</span>
                            </div>
                          )}
                        </div>
                      </div>

                      <div className="flex-1 w-full rounded-[20px] overflow-hidden shadow-sm border border-gray-100 relative group flex items-center justify-center bg-white/60 backdrop-blur-sm min-h-[96px]">
                        {dashboardImageUrl ? <img src={dashboardImageUrl} className="w-full h-full object-cover" /> : <span className="text-[10px] font-bold text-gray-400 flex flex-col items-center gap-1 opacity-70"><IconImage size={18} /> ใส่รูปอ้างอิง</span>}
                        {isAdmin && (
                          <button onClick={openDashboardImgPrompt} className="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span className="bg-white/90 text-[#ff96d3] text-[9px] px-3 py-1.5 rounded-full font-black shadow-sm">แก้ไขรูปภาพ</span>
                          </button>
                        )}
                      </div>
                    </div>

                    <div className="flex-1 flex flex-col gap-2">
                      <div className="h-28"><ProgressFlower progress={progress} todayTasksLength={todayTasks.length} doneToday={doneToday} triggerFlowerBounce={triggerFlowerBounce} isBouncing={isBouncing} /></div>
                      <div className="flex justify-between items-center backdrop-blur-sm rounded-[20px] px-3 py-1.5 shadow-sm bg-white/90 border border-gray-100 shrink-0">
                        <a href={linkNotion} target="_blank" rel="noreferrer" className="p-1 rounded-xl hover:bg-[#fff9f9] transition-all text-[#B0BEC5] hover:text-[#ff96d3] active:scale-95 flex items-center justify-center"><IconNotion size={18} /></a>
                        <a href={linkWebsite} target="_blank" rel="noreferrer" className="p-1 rounded-xl hover:bg-[#fff9f9] transition-all text-[#B0BEC5] hover:text-[#ff96d3] active:scale-95 flex items-center justify-center"><IconGlobe size={18} /></a>
                        <a href={linkDrive} target="_blank" rel="noreferrer" className="p-1 rounded-xl hover:bg-[#fff9f9] transition-all text-[#B0BEC5] hover:text-[#ff96d3] active:scale-95 flex items-center justify-center"><IconDrive size={18} /></a>
                      </div>

                      <div className="flex-1 min-h-[96px] backdrop-blur-sm rounded-[20px] p-2 shadow-sm flex flex-col border border-gray-100 bg-white/90 relative">
                        <div className="text-[9px] font-black text-[#ff96d3] uppercase tracking-widest px-1 mb-1.5 flex items-center gap-1 shrink-0"><IconCheck size={10}/> To do list</div>
                        <div className="todo-scrollbar overflow-y-auto flex-1 pr-1 space-y-2">
                          {todos.map(todo => (
                            <label key={todo.id} className="flex items-start gap-1.5 text-[10px] cursor-pointer group relative">
                              <input type="checkbox" checked={todo.isDone || false} onChange={(e) => handleToggleTodo(todo.id, e.target.checked)} className="mt-[1px] accent-[#ff96d3] shrink-0" disabled={!isAdmin} />
                              <span className={`leading-tight font-bold transition-colors pr-4 ${todo.isDone ? 'text-gray-400 line-through' : 'text-gray-600 group-hover:text-[#ff96d3]'}`}>{todo.text}</span>
                              {isAdmin && <button onClick={(e) => { e.preventDefault(); triggerDeleteTodo(todo.id); }} className="absolute right-0 top-0 text-red-300 opacity-0 group-hover:opacity-100 hover:text-red-500"><IconTrash size={12}/></button>}
                            </label>
                          ))}
                        </div>
                        {isAdmin && (
                          <div className="mt-1 pt-1 border-t border-gray-100 flex items-center gap-1 shrink-0">
                            <input type="text" placeholder="พิมพ์เพิ่ม..." value={newTodoText} onChange={e=>setNewTodoText(e.target.value)} onKeyDown={handleAddTodo} className="flex-1 bg-transparent text-[9px] font-bold outline-none px-1 text-gray-600 placeholder-gray-300" />
                            <button onClick={()=>handleAddTodo({key:'Enter'})} className="text-[#b5e48c] p-0.5 hover:bg-gray-50 rounded-md transition-colors"><IconPlus size={14}/></button>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>

                  {pinnedTasks.length > 0 && (
                    <div className="mb-4 mt-3">
                      <div className="flex items-center justify-between mb-2 ml-1">
                        <h2 className="text-[10px] font-black text-[#b5e48c] italic uppercase tracking-[0.3em] opacity-80">Pinned Tasks 📌</h2>
                        <div className="h-[1px] flex-1 bg-gradient-to-r from-[#b5e48c]/50 to-transparent mx-3"></div>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        {pinnedTasks.map(t => (
                          <div key={t.id} onClick={() => isAdmin && openTaskModal(t)} className="running-border shadow-sm cursor-pointer hover:scale-[1.02] transition-transform">
                            <div className="running-border-inner p-2.5 flex flex-col relative overflow-hidden">
                              <span className="text-[11px] font-bold text-gray-700 truncate pr-8">{t.client}</span>
                              <span className="text-[9px] font-black text-[#b5e48c] mt-0.5 truncate">{t.type}</span>
                              {(t.priority === 'urgent' || t.priority === 'very_urgent' || t.recurringType !== 'none') && (
                                <div className={`absolute top-2.5 right-2 text-[7px] border px-1.5 py-0.5 rounded-md font-black shadow-sm ${t.priority==='very_urgent' ? 'bg-[#fff9f9] border-[#ff96d3]/30 text-[#ff96d3]' : 'bg-gray-50 border-gray-200 text-gray-500'}`}>
                                  {t.priority === 'very_urgent' ? 'ด่วน 🔥' : t.recurringType === 'weekly' ? 'ทุกสัปดาห์' : 'ทุกเดือน'}
                                </div>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <div className="flex items-center justify-between mb-2.5 ml-1">
                    <h2 className="text-[10px] font-black text-gray-400 italic uppercase tracking-[0.3em] opacity-60">Today's Task</h2>
                    <div className="h-[1px] flex-1 bg-gradient-to-r from-[#FFD2E4]/60 to-transparent mx-3"></div>
                  </div>
                  <div className="space-y-1">
                    {todayTasks.length > 0 ? todayTasks.map(t => <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={openTaskModal} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} />) : (
                      <div className="text-center py-10 rounded-[28px] border border-dashed shadow-sm" style={{ backgroundColor: `${COLORS.cardWhite}4d`, borderColor: COLORS.pinkDeep }}>
                        <p className="text-[9px] font-bold uppercase tracking-widest opacity-60" style={{ color: COLORS.pinkDeep }}>Sky is clear ✨</p>
                      </div>
                    )}
                  </div>
                </div>

              ) : view === 'all' ? (
                <div className="animate-fadeIn">
                  <div className="relative mb-4">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-50" style={{ color: COLORS.blueDeep }}><IconSearch size={16} /></div>
                    <input type="text" placeholder="ค้นหาคิวงาน..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full rounded-[22px] py-3 pl-10 pr-4 outline-none text-xs transition-all backdrop-blur-sm shadow-sm border border-gray-100 focus:border-[#ff96d3]" />
                  </div>
                  <div className="flex gap-2 mb-3 p-1.5 rounded-full backdrop-blur-md shadow-sm border border-gray-100 bg-white/50">
                      <button onClick={() => setFilterType('all')} className={`flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider ${filterType === 'all' ? 'shadow-sm bg-white text-[#ff96d3]' : 'text-gray-400'}`}>ทั้งหมด</button>
                      <button onClick={() => setFilterType('pending')} className={`flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider ${filterType === 'pending' ? 'shadow-sm bg-white text-[#b5e48c]' : 'text-gray-400'}`}>ยังไม่ได้เริ่ม</button>
                      <button onClick={() => setFilterType('done')} className={`flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider ${filterType === 'done' ? 'shadow-sm bg-white text-[#ff96d3]' : 'text-gray-400'}`}>เสร็จแล้ว</button>
                  </div>
                  <div className="flex justify-end mb-4 pr-1">
                    <button onClick={() => { setIsCalendarView(!isCalendarView); if(!isCalendarView) setFilterType('all'); }} className="flex items-center gap-1.5 px-3 py-1.5 backdrop-blur-md rounded-full text-[9px] font-black uppercase tracking-widest transition-all active:scale-95 shadow-sm border border-gray-100 bg-white/80 text-[#b5e48c]">
                      {isCalendarView ? <><IconList size={14} /> รูปแบบรายการ</> : <><IconCalendar size={14} /> รูปแบบปฏิทิน</>}
                    </button>
                  </div>
                  {isCalendarView && <CalendarView currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} selectedDate={selectedDate} setSelectedDate={setSelectedDate} today={today} tasks={tasks} />}
                  <div className="space-y-1">
                    {displayedTasks.length > 0 ? displayedTasks.map(t => <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={openTaskModal} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} />) : (
                      <div className="text-center py-10 rounded-[28px] border border-dashed shadow-sm mt-4 border-[#ff96d3] bg-white/30">
                        <p className="text-[10px] font-black uppercase tracking-widest opacity-60 text-[#b5e48c]">{isCalendarView ? "วันนี้คิวว่าง ✨" : "No records found ✨"}</p>
                      </div>
                    )}
                  </div>
                </div>

              ) : view === 'students' ? (
                <div className="animate-fadeIn">
                  <div className="flex gap-2 mb-4 p-1.5 rounded-full backdrop-blur-md shadow-sm border border-gray-100 bg-white/50">
                      <button onClick={() => setStudentSubView('list')} className={`flex-1 text-[10px] font-black py-2.5 rounded-full transition-all tracking-wider ${studentSubView === 'list' ? 'shadow-sm bg-white text-[#ff96d3]' : 'text-gray-400'}`}>รายชื่อนักเรียน</button>
                      <button onClick={() => { if(isAdmin) {setEditingStudent(null); setStudentSubView('form');} else setShowAuthModal(true); }} className={`flex-1 text-[10px] font-black py-2.5 rounded-full transition-all tracking-wider ${studentSubView === 'form' ? 'shadow-sm bg-white text-[#b5e48c]' : 'text-gray-400'}`}>เพิ่มประวัติใหม่ ✨</button>
                  </div>

                  {studentSubView === 'list' && (
                    <div className="animate-slideUp">
                      <div className="relative mb-4">
                        <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-50 text-[#ff96d3]"><IconSearch size={16} /></div>
                        <input type="text" placeholder="ค้นหาชื่อ หรือ ชื่อเล่น..." value={studentSearchQuery} onChange={(e) => setStudentSearchQuery(e.target.value)} className="w-full rounded-[22px] py-3 pl-10 pr-4 outline-none text-xs transition-all backdrop-blur-sm shadow-sm border border-gray-100 focus:border-[#ff96d3]" />
                      </div>
                      <div className="space-y-2">
                        {students.filter(s => (s.fullname||'').includes(studentSearchQuery) || (s.nickname||'').includes(studentSearchQuery)).map((student) => (
                          <div key={student.id} onClick={() => setViewingStudent(student)} className="bg-white/90 backdrop-blur-sm rounded-[22px] p-3 shadow-sm border border-gray-100 flex items-center gap-3 transition-transform hover:scale-[1.01] cursor-pointer">
                            <div className="w-12 h-12 rounded-[14px] bg-gradient-to-tr from-[#FFD2E4] to-[#CCE9ED] shrink-0 flex items-center justify-center overflow-hidden border border-white shadow-inner">
                              {student.photo_link ? <img src={formatStudentFile(student.photo_link, false)} className="w-full h-full object-cover" /> : <IconUser size={20} className="text-white opacity-80" />}
                            </div>
                            <div className="flex-1 min-w-0">
                              <h3 className="text-[12px] font-bold text-gray-700 truncate">{student.fullname}</h3>
                              <p className="text-[10px] font-black mt-0.5 text-[#b5e48c]">{student.nickname ? `น้อง${student.nickname}` : '-'}</p>
                              <p className="text-[9px] text-gray-400 mt-1 flex items-center gap-1"><IconClock size={10}/> โทร: {student.phone || '-'}</p>
                            </div>
                            {student.pdf_link && (
                              <button onClick={(e) => { e.stopPropagation(); window.open(formatStudentFile(student.pdf_link, true), '_blank'); }} className="shrink-0 w-8 h-8 rounded-full bg-[#ff96d3]/10 text-[#ff96d3] flex items-center justify-center hover:bg-[#ff96d3] hover:text-white transition-colors" title="ดูไฟล์ PDF">
                                <IconEye size={14} />
                              </button>
                            )}
                            {isAdmin && (
                              <div className="flex flex-col gap-1.5 shrink-0 border-l border-gray-100 pl-2 ml-1">
                                <button onClick={(e) => { e.stopPropagation(); setEditingStudent(student); setStudentSubView('form'); }} className="w-7 h-7 rounded-lg bg-[#fff9f9] border border-[#FFD2E4] text-[#ff96d3] flex items-center justify-center hover:bg-[#ff96d3] hover:text-white transition-colors active:scale-90" title="แก้ไข">
                                  <IconEdit size={14} />
                                </button>
                                <button onClick={(e) => { e.stopPropagation(); triggerDeleteStudent(student.id); }} className="w-7 h-7 rounded-lg bg-red-50 border border-red-100 text-red-400 flex items-center justify-center hover:bg-red-400 hover:text-white transition-colors active:scale-90" title="ลบ">
                                  <IconTrash size={14} />
                                </button>
                              </div>
                            )}
                          </div>
                        ))}
                        {students.length === 0 && <p className="text-center text-[10px] text-gray-400 mt-6 font-bold tracking-widest">ยังไม่มีรายชื่อนักเรียน 🎒</p>}
                      </div>
                    </div>
                  )}

                  {studentSubView === 'form' && isAdmin && (
                    <form onSubmit={handleSaveStudent} className="animate-slideUp bg-white/90 backdrop-blur-md rounded-[32px] p-5 shadow-lg border border-gray-100 mb-6 relative">
                      {isSaving && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center rounded-[32px] backdrop-blur-sm bg-white/80">
                           <IconLoader size={32} className="animate-spin-slow text-[#ff96d3]" />
                           <span className="text-[10px] font-black mt-2 text-gray-500">กำลังอัปโหลดและบันทึก...</span>
                        </div>
                      )}
                      <h2 className="text-sm font-black text-center mb-5 text-[#ff96d3]">{editingStudent ? 'แก้ไขประวัตินักเรียน ✏️' : 'เพิ่มประวัตินักเรียนใหม่ ✨'}</h2>
                      <div className="space-y-3 relative">
                        <div className="flex flex-col items-center mb-2">
                          <div className="w-20 h-20 rounded-[22px] bg-gradient-to-tr from-[#FFD2E4] to-[#CCE9ED] flex items-center justify-center mb-2 shadow-sm border-2 border-white overflow-hidden relative">
                             {editingStudent?.photo_link ? <img src={formatStudentFile(editingStudent.photo_link, false)} className="w-full h-full object-cover" /> : <IconUser size={32} className="text-white opacity-80" />}
                          </div>
                          <label className="text-[9px] font-bold text-gray-500 bg-white px-3 py-1.5 rounded-full border border-gray-100 cursor-pointer hover:bg-gray-50 shadow-sm transition-all active:scale-95">
                            + เลือกไฟล์รูปภาพ
                            <input type="file" name="photoFile" accept="image/*" className="hidden" />
                          </label>
                        </div>
                        <div>
                          <label className="text-[10px] font-black text-[#b5e48c] ml-1 mb-1 block">ชื่อ - นามสกุล</label>
                          <input type="text" name="fullname" required defaultValue={editingStudent?.fullname} className="w-full p-3 rounded-[16px] bg-white border border-gray-100 text-[11px] outline-none focus:border-[#ff96d3] shadow-sm" placeholder="เช่น ด.ช. สมชาย ใจดี" />
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          <div>
                            <label className="text-[10px] font-black text-[#b5e48c] ml-1 mb-1 block">ชื่อเล่น</label>
                            <input type="text" name="nickname" defaultValue={editingStudent?.nickname} className="w-full p-3 rounded-[16px] bg-white border border-gray-100 text-[11px] outline-none focus:border-[#ff96d3] shadow-sm" placeholder="น้อง..." />
                          </div>
                          <div>
                            <label className="text-[10px] font-black text-[#b5e48c] ml-1 mb-1 block">วันเกิด</label>
                            <input type="date" name="birthdate" defaultValue={editingStudent?.birthdate} className="w-full p-3 rounded-[16px] bg-white border border-gray-100 text-[11px] font-bold text-gray-500 outline-none focus:border-[#ff96d3] shadow-sm" />
                          </div>
                        </div>
                        <div className="pt-2 border-t border-gray-50">
                          <div className="grid grid-cols-2 gap-2 mb-2">
                            <div>
                              <label className="text-[10px] font-black text-[#ff96d3] ml-1 mb-1 block">ชื่อ-สกุล บิดา</label>
                              <input type="text" name="father_name" defaultValue={editingStudent?.father_name} className="w-full p-3 rounded-[16px] bg-white border border-gray-100 text-[11px] outline-none focus:border-[#ff96d3] shadow-sm" placeholder="ชื่อ-สกุล บิดา" />
                            </div>
                            <div>
                              <label className="text-[10px] font-black text-[#ff96d3] ml-1 mb-1 block">อาชีพ</label>
                              <input type="text" name="father_occ" defaultValue={editingStudent?.father_occ} className="w-full p-3 rounded-[16px] bg-white border border-gray-100 text-[11px] outline-none focus:border-[#ff96d3] shadow-sm" placeholder="อาชีพ" />
                            </div>
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="text-[10px] font-black text-[#ff96d3] ml-1 mb-1 block">ชื่อ-สกุล มารดา</label>
                              <input type="text" name="mother_name" defaultValue={editingStudent?.mother_name} className="w-full p-3 rounded-[16px] bg-white border border-gray-100 text-[11px] outline-none focus:border-[#ff96d3] shadow-sm" placeholder="ชื่อ-สกุล มารดา" />
                            </div>
                            <div>
                              <label className="text-[10px] font-black text-[#ff96d3] ml-1 mb-1 block">อาชีพ</label>
                              <input type="text" name="mother_occ" defaultValue={editingStudent?.mother_occ} className="w-full p-3 rounded-[16px] bg-white border border-gray-100 text-[11px] outline-none focus:border-[#ff96d3] shadow-sm" placeholder="อาชีพ" />
                            </div>
                          </div>
                        </div>
                        <div className="pt-2 border-t border-gray-50">
                          <label className="text-[10px] font-black text-[#b5e48c] ml-1 mb-1 block">เบอร์โทรศัพท์</label>
                          <input type="tel" name="phone" defaultValue={editingStudent?.phone} className="w-full p-3 rounded-[16px] bg-white border border-gray-100 text-[11px] outline-none focus:border-[#ff96d3] shadow-sm mb-2" placeholder="08X-XXX-XXXX" />
                          <label className="text-[10px] font-black text-[#b5e48c] ml-1 mb-1 block">ที่อยู่</label>
                          <textarea rows="2" name="address" defaultValue={editingStudent?.address} className="w-full p-3 rounded-[16px] bg-white border border-gray-100 text-[11px] outline-none focus:border-[#ff96d3] shadow-sm resize-none" placeholder="บ้านเลขที่ หมู่ ซอย..."></textarea>
                        </div>
                        <div className="pt-2 border-t border-gray-50 bg-[#fff9f9]/50 p-2.5 rounded-[20px] border border-[#FFD2E4]/50">
                          <label className="text-[10px] font-black text-[#ff96d3] ml-1 mb-1 flex items-center gap-1"><IconGlobe size={12}/> ลิงก์เพิ่มเติม</label>
                          <input type="url" name="extra_link" defaultValue={editingStudent?.extra_link} className="w-full p-2.5 rounded-[12px] bg-white border border-gray-100 text-[10px] outline-none focus:border-[#ff96d3] shadow-sm mb-3" placeholder="วางลิงก์ที่นี่..." />
                          <label className="text-[10px] font-black text-[#ff96d3] ml-1 mb-1 flex items-center gap-1"><IconFileText size={12}/> อัปโหลดไฟล์ประวัติ PDF</label>
                          <div className="flex items-center gap-2">
                            <input type="file" name="pdfFile" accept=".pdf" className="flex-1 bg-white p-2 rounded-[12px] border border-gray-100 text-[9px] shadow-sm file:mr-2 file:py-1 file:px-2 file:rounded-full file:border-0 file:text-[9px] file:font-bold file:bg-[#ff96d3]/10 file:text-[#ff96d3] hover:file:bg-[#ff96d3]/20" />
                          </div>
                          {editingStudent?.pdf_link && (
                            <p className="text-[8px] font-bold text-gray-400 mt-1.5 px-1">*มีไฟล์แนบเดิมอยู่แล้ว หากไม่อัปโหลดใหม่ระบบจะใช้ไฟล์เดิม</p>
                          )}
                        </div>
                        <div className="pt-4 flex gap-2">
                          <button type="button" onClick={() => setStudentSubView('list')} className="flex-1 py-3.5 rounded-[16px] font-black text-[11px] text-gray-500 bg-gray-100 hover:bg-gray-200 transition-colors active:scale-95 shadow-sm">ยกเลิก</button>
                          <button type="submit" className="flex-[2] py-3.5 rounded-[16px] font-black text-[11px] text-white transition-all active:scale-95 shadow-md bg-[#ff96d3]">บันทึกประวัติ</button>
                        </div>
                      </div>
                    </form>
                  )}
                </div>
              ) : null}
            </div>

            {/* ===== Bottom Navigation Bar ===== */}
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[260px] h-[86px] z-50">
              <svg className="absolute bottom-0 left-0 w-full h-full drop-shadow-[0_10px_15px_rgba(255,210,228,0.4)]" viewBox="0 0 260 86" fill="none">
                <path
                  d={isAdmin
                    ? "M 28 86 L 232 86 A 28 28 0 0 0 260 58 A 28 28 0 0 0 232 30 L 168 30 C 155 30 155 4 130 4 C 105 4 105 30 92 30 L 28 30 A 28 28 0 0 0 0 58 A 28 28 0 0 0 28 86 Z"
