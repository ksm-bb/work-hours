                    : "M 28 86 L 232 86 A 28 28 0 0 0 260 58 A 28 28 0 0 0 232 30 L 168 30 C 155 30 155 30 130 30 C 105 30 105 30 92 30 L 28 30 A 28 28 0 0 0 0 58 A 28 28 0 0 0 28 86 Z"
                  }
                  fill="rgba(255,255,255,0.95)" stroke={COLORS.cardBorder} strokeWidth="1.5" style={{ transition: 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)' }}
                />
              </svg>
              <div className="absolute bottom-0 left-0 w-full h-[56px] flex items-center justify-between px-8 z-10">
                  <button onClick={() => setView('dashboard')} className={`p-1.5 transition-all ${view === 'dashboard' ? 'scale-110 text-[#ff96d3]' : 'text-gray-300 opacity-60'}`}><IconHome size={22} /></button>
                  <button onClick={() => setView('all')} className={`p-1.5 transition-all ${view === 'all' ? 'scale-110 text-[#b5e48c]' : 'text-gray-300 opacity-60'}`}><IconFileText size={22} /></button>
                  <button onClick={() => setView('students')} className={`p-1.5 transition-all ${view === 'students' ? 'scale-110 text-[#E7F098] brightness-90' : 'text-gray-300 opacity-60'}`}><IconUser size={22} /></button>
              </div>
              {isAdmin && (
                <div className="absolute -top-2 left-1/2 -translate-x-1/2 z-20 animate-fadeIn">
                  <button onClick={() => {
                      if(view === 'students') { setEditingStudent(null); setStudentSubView('form'); }
                      else { openTaskModal(); }
                  }} className="w-14 h-14 rounded-full text-white flex items-center justify-center transition-transform active:scale-90 shadow-sm border-[4px] border-white bg-[#ff96d3]">
                    <IconPlus size={24} />
                  </button>
                </div>
              )}
            </div>

            {/* ===== MODALS ===== */}
            {viewingStudent && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/20 backdrop-blur-[2px] animate-fadeIn" onClick={() => setViewingStudent(null)}>
                <div className="backdrop-blur-xl w-full max-w-[320px] rounded-[30px] p-6 shadow-2xl animate-slideUp bg-white/95 border border-gray-100 relative" onClick={e => e.stopPropagation()}>
                  <button onClick={() => setViewingStudent(null)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 active:scale-95 transition-colors font-bold">✕</button>
                  <div className="flex flex-col items-center mb-4 mt-2">
                    <div className="w-20 h-20 rounded-[18px] bg-gradient-to-tr from-[#FFD2E4] to-[#CCE9ED] flex items-center justify-center overflow-hidden border-2 border-white shadow-sm mb-3">
                      {viewingStudent.photo_link ? <img src={formatStudentFile(viewingStudent.photo_link, false)} className="w-full h-full object-cover" /> : <IconUser size={32} className="text-white opacity-80" />}
                    </div>
                    <h3 className="text-[16px] font-black text-gray-800 text-center px-4">{viewingStudent.fullname}</h3>
                    <p className="text-[12px] font-bold text-[#ff96d3] mt-0.5">{viewingStudent.nickname ? `น้อง${viewingStudent.nickname}` : ''}</p>
                  </div>
                  <div className="space-y-2 text-[11px] text-gray-600 bg-gray-50 p-4 rounded-[20px] border border-gray-100 mb-3">
                    <p className="flex justify-between"><strong>วันเกิด:</strong> <span>{viewingStudent.birthdate ? new Date(viewingStudent.birthdate).toLocaleDateString('th-TH', {day: '2-digit', month: 'short', year: 'numeric'}) : '-'}</span></p>
                    <div className="border-t border-gray-200 my-1"></div>
                    <p className="flex justify-between"><strong>บิดา:</strong> <span className="text-right">{viewingStudent.father_name || '-'} <br/> <span className="text-[9px] text-gray-400">({viewingStudent.father_occ || '-'})</span></span></p>
                    <p className="flex justify-between mt-2"><strong>มารดา:</strong> <span className="text-right">{viewingStudent.mother_name || '-'} <br/> <span className="text-[9px] text-gray-400">({viewingStudent.mother_occ || '-'})</span></span></p>
                    <div className="border-t border-gray-200 my-1"></div>
                    <p className="flex justify-between"><strong>โทร:</strong> <span>{viewingStudent.phone || '-'}</span></p>
                    <p className="flex justify-between items-start gap-2"><strong>ที่อยู่:</strong> <span className="text-right text-[10px] max-w-[150px]">{viewingStudent.address || '-'}</span></p>
                  </div>
                  {viewingStudent.extra_link && (
                    <div className="mb-3 p-3 bg-[#CCE9ED]/30 rounded-[16px] border border-[#CCE9ED]">
                       <span className="text-[10px] font-bold text-gray-500 block mb-1">ลิงก์เพิ่มเติม:</span>
                       <a href={viewingStudent.extra_link} target="_blank" rel="noreferrer" className="text-[11px] font-black text-[#4a90e2] underline break-all block">{viewingStudent.extra_link}</a>
                    </div>
                  )}
                  {viewingStudent.pdf_link && (
                    <button onClick={() => window.open(formatStudentFile(viewingStudent.pdf_link, true), '_blank')} className="w-full py-3.5 rounded-[16px] font-black text-[11px] text-white bg-[#ff96d3] hover:opacity-80 active:scale-95 transition-all shadow-md flex items-center justify-center gap-2">
                      <IconEye size={16} /> เปิดดูไฟล์ประวัติ (PDF)
                    </button>
                  )}
                </div>
              </div>
            )}

            {showModal && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/10 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={handleSaveTask} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp bg-white/95 border border-gray-100">
                   <h3 className="text-sm font-black mb-4 text-center text-[#ff96d3]">{editingTask ? 'แก้ไขคิวงาน ✨' : 'เพิ่มคิวใหม่ ✨'}</h3>
                   <div className="space-y-2 relative">
                     {isSaving && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center rounded-2xl backdrop-blur-sm bg-white/80">
                           <IconLoader size={32} className="animate-spin-slow text-[#ff96d3]" />
                        </div>
                     )}
                     <div className="flex justify-end gap-2 mb-2">
                       <label className="flex items-center cursor-pointer gap-1.5 px-3 py-1.5 rounded-full shadow-sm border bg-white border-gray-100">
                         <input type="radio" name="priority" value="normal" defaultChecked={!editingTask || editingTask?.priority === 'normal'} className="w-3 h-3 accent-[#ff96d3]" />
                         <span className="text-[10px] font-bold text-gray-500">ปกติ</span>
                       </label>
                       <label className="flex items-center cursor-pointer gap-1.5 px-3 py-1.5 rounded-full shadow-sm border bg-white border-gray-100">
                         <input type="radio" name="priority" value="urgent" defaultChecked={editingTask?.priority === 'urgent'} className="w-3 h-3 accent-[#ff96d3]" />
                         <span className="text-[10px] font-bold text-gray-500">ด่วน</span>
                       </label>
                       <label className="flex items-center cursor-pointer gap-1.5 px-3 py-1.5 rounded-full shadow-sm border bg-white border-gray-100">
                         <input type="radio" name="priority" value="very_urgent" defaultChecked={editingTask?.priority === 'very_urgent'} className="w-3 h-3 accent-[#ff96d3]" />
                         <span className="text-[10px] font-bold text-gray-500">ด่วนมาก 🔥</span>
                       </label>
                     </div>
                     <div className="flex items-center justify-between gap-2 mb-1 mt-1">
                       <div className="flex-1 flex items-center justify-between p-2 rounded-[14px] border border-gray-100 shadow-sm bg-white focus-within:border-[#ff96d3]">
                         <div className="flex items-center gap-1 text-[9px] font-bold uppercase tracking-wider text-[#b5e48c]"><IconClock size={12} /><span>รอบงาน</span></div>
                         <select value={recType} onChange={e => {setRecType(e.target.value); setRecVal('');}} className="bg-transparent text-[10px] font-black text-gray-600 outline-none pr-1">
                           <option value="none">ครั้งเดียว</option>
                           <option value="weekly">ทุกสัปดาห์</option>
                           <option value="monthly">ทุกเดือน</option>
                         </select>
                       </div>
                       <label className="shrink-0 flex items-center justify-center gap-1.5 p-2 px-3 rounded-[14px] border border-gray-100 shadow-sm cursor-pointer hover:bg-gray-50 bg-white">
                         <input type="checkbox" name="isPinned" defaultChecked={editingTask?.isPinned} className="w-3.5 h-3.5 accent-[#ff96d3]" />
                         <span className="text-[9px] font-bold text-gray-500 uppercase">📌 ปักหมุด</span>
                       </label>
                     </div>
                     {recType === 'weekly' && (
                       <div className="flex justify-between gap-1 mb-2 bg-gray-50 p-2 rounded-[16px] border border-gray-100">
                         {['อา','จ','อ','พ','พฤ','ศ','ส'].map((day, idx) => {
                            const isSelected = recVal ? recVal.split(',').map(Number).includes(idx) : false;
                            return (
                              <button key={idx} type="button" onClick={() => toggleWeeklyDay(idx)} className={`w-7 h-7 rounded-full text-[10px] font-black transition-all shadow-sm ${isSelected ? 'bg-[#ff96d3] text-white' : 'bg-white text-gray-400 border border-gray-200'}`}>
                                {day}
                              </button>
                            )
                         })}
                       </div>
                     )}
                     {recType === 'monthly' && (
                       <div className="mb-2">
                         <input type="text" value={recVal} onChange={e=>setRecVal(e.target.value)} placeholder="ใส่วันที่ (เช่น 10) หรือช่วงวัน (เช่น 25-5)" className="w-full p-2.5 rounded-[14px] border border-gray-100 text-[10px] font-bold text-center bg-gray-50 outline-none focus:border-[#ff96d3]" />
                       </div>
                     )}
                     <div className="flex flex-col gap-2 mb-2 mt-2">
                       <input name="client" required defaultValue={editingTask?.client || ''} className="w-full p-3.5 rounded-2xl border border-gray-100 outline-none text-[11px] shadow-sm focus:border-[#ff96d3] bg-white" placeholder="รายการกำหนด" />
                       <input list="taskTypesList" name="type" required defaultValue={editingTask?.type || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none border border-gray-100 shadow-sm focus:border-[#ff96d3] bg-white" placeholder="ประเภทงาน" />
                       <datalist id="taskTypesList">{taskTypes.map(type => <option key={type} value={type} />)}</datalist>
                       <div className="flex items-center justify-between p-2 pl-3.5 rounded-2xl border border-gray-100 shadow-sm focus-within:border-[#ff96d3] bg-white">
                         <div className="flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider text-[#b5e48c]"><IconClock size={12} /><span>ช่วงเวลา</span></div>
                         <div className="flex items-center gap-1">
                           <input type="time" name="time_start" defaultValue={editingTask?.time_period ? editingTask.time_period.split('-')[0].trim() : ''} className="w-[72px] p-1.5 rounded-xl border border-gray-100 outline-none text-[10px] font-black text-center shadow-sm bg-gray-50 focus:border-[#ff96d3] text-[#ff96d3]" />
                           <span className="text-gray-300 font-bold">-</span>
                           <input type="time" name="time_end" defaultValue={editingTask?.time_period && editingTask.time_period.includes('-') ? editingTask.time_period.split('-')[1].trim() : ''} className="w-[72px] p-1.5 rounded-xl border border-gray-100 outline-none text-[10px] font-black text-center shadow-sm bg-gray-50 focus:border-[#ff96d3] text-[#ff96d3]" />
                         </div>
                       </div>
                       <input name="channel" required defaultValue={editingTask?.channel || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none border border-gray-100 shadow-sm focus:border-[#ff96d3] bg-white" placeholder="Link" />
                       <textarea name="details" rows="2" defaultValue={editingTask?.details || ''} className="w-full p-3.5 rounded-2xl border border-gray-100 outline-none text-[11px] shadow-sm resize-none focus:border-[#ff96d3] bg-white" placeholder="สถานที่"></textarea>
                     </div>
                     <div className="flex items-center justify-between p-1.5 pl-4 rounded-2xl border transition-all bg-[#ff96d3]/10 border-[#ff96d3]/50">
                       <div className="flex items-center gap-1.5 text-[10px] uppercase tracking-wider font-black text-[#ff96d3]">
                         <IconCalendar size={12} /><span>{recType === 'none' ? 'กำหนดส่ง' : 'วันเริ่มนับรอบ'}</span>
                       </div>
                       <input name="deadline" type="date" required defaultValue={editingTask?.deadline || nextQueueDate} className="w-32 p-2.5 rounded-xl border outline-none text-[10px] font-black shadow-sm focus:border-[#ff96d3] bg-white text-[#ff96d3] border-gray-100" />
                     </div>
                     <div className="flex items-center gap-2 mt-3">
                       <button type="submit" className="flex-1 py-3.5 rounded-2xl font-black text-xs text-white shadow-lg active:scale-95 transition-all bg-[#ff96d3]">บันทึกคิวงาน</button>
                       {editingTask && (
                         <button type="button" onClick={() => triggerDeleteTask(editingTask.id)} className="w-12 h-[44px] flex items-center justify-center rounded-2xl bg-red-50 text-red-400 border border-red-100 hover:bg-red-100 shadow-sm"><IconTrash size={18} /></button>
                       )}
                     </div>
                     <button type="button" onClick={() => setShowModal(false)} className="w-full text-[9px] font-bold text-gray-400 mt-2 uppercase tracking-widest hover:text-gray-500">Close</button>
                   </div>
                </form>
              </div>
            )}

            {showAuthModal && (
              <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/10 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={handleAdminLogin} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp bg-white/95 border border-gray-100">
                   <h3 className="text-sm font-black mb-4 text-center text-[#ff96d3]">เข้าสู่ระบบ Admin</h3>
                   <div className="space-y-2">
                     <input type="password" required value={password} onChange={(e) => { setPassword(e.target.value); setAuthError(false); }} className={`w-full p-3.5 rounded-2xl border outline-none text-[11px] shadow-sm text-center tracking-widest bg-white ${authError ? 'border-red-300' : 'border-gray-100 focus:border-[#ff96d3]'}`} placeholder="ใส่รหัสผ่าน" />
                     {authError && <p className="text-red-400 text-[9px] text-center font-bold">รหัสผ่านไม่ถูกต้อง!</p>}
                     <button type="submit" disabled={isVerifyingAuth} className="w-full h-11 rounded-2xl font-black text-xs mt-3 text-white shadow-lg flex items-center justify-center active:scale-95 bg-[#ff96d3]">{isVerifyingAuth ? <IconLoader size={16} className="animate-spin-slow" /> : 'Login'}</button>
                     <button type="button" onClick={() => { setShowAuthModal(false); setAuthError(false); setPassword(''); }} className="w-full text-[9px] font-bold text-gray-400 mt-1 uppercase tracking-widest hover:text-gray-500">Close</button>
                   </div>
                </form>
              </div>
            )}

            <CustomConfirmModal isOpen={confirmModal.isOpen} title={confirmModal.title} message={confirmModal.message} onCancel={() => setConfirmModal({ ...confirmModal, isOpen: false })} onConfirm={confirmModal.action} />
            <CustomPromptModal isOpen={promptModal.isOpen} title={promptModal.title} placeholder={promptModal.placeholder} initialValue={promptModal.value} onCancel={() => setPromptModal({ ...promptModal, isOpen: false })} onConfirm={handlePromptSave} />

            {showImageModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/10 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={(e) => {
                    e.preventDefault();
                    if (tempImageUrl) {
                        const u = formatSystemImage(tempImageUrl);
                        setProfileImage(u);
                        fetchAPI({ action: 'saveSetting', key: 'profileImage', value: u });
                    }
                    setShowImageModal(false);
                    setTempImageUrl('');
                }} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp bg-white/95 border border-gray-100">
                   <h3 className="text-sm font-black mb-4 text-center text-[#ff96d3]">เปลี่ยนรูปโปรไฟล์ 🐰</h3>
                   <input type="url" required value={tempImageUrl} onChange={(e) => setTempImageUrl(e.target.value)} className="w-full p-3.5 rounded-2xl border border-gray-100 outline-none text-[11px] shadow-sm focus:border-[#ff96d3] text-center bg-white" placeholder="ลิงก์ Drive รูปภาพ..." />
                   <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 text-white shadow-lg active:scale-95 bg-[#ff96d3]">Save</button>
                   <button type="button" onClick={() => { setShowImageModal(false); setTempImageUrl(''); }} className="w-full text-[9px] font-bold text-gray-400 mt-2 uppercase tracking-widest hover:text-gray-500">Close</button>
                </form>
              </div>
            )}

            {showBannerModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/10 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={(e) => {
                    e.preventDefault();
                    if (tempBannerUrl) {
                        const u = formatSystemImage(tempBannerUrl);
                        setBannerImage(u);
                        toggleBannerVisibility(true);
                        fetchAPI({ action: 'saveSetting', key:'bannerImage', value: u });
                    }
                    setShowBannerModal(false);
                    setTempBannerUrl('');
                }} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp bg-white/95 border border-gray-100">
                   <h3 className="text-sm font-black mb-4 text-center text-[#ff96d3]">เปลี่ยนแบนเนอร์</h3>
                   <input type="url" required value={tempBannerUrl} onChange={(e) => setTempBannerUrl(e.target.value)} className="w-full p-3.5 rounded-2xl border border-gray-100 outline-none text-[11px] shadow-sm focus:border-[#ff96d3] text-center bg-white" placeholder="ลิงก์ Drive รูปภาพ..." />
                   <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 text-white shadow-lg active:scale-95 bg-[#b5e48c]">Save Banner</button>
                   <button type="button" onClick={() => { setShowBannerModal(false); setTempBannerUrl(''); }} className="w-full text-[9px] font-bold text-gray-400 mt-2 uppercase tracking-widest hover:text-gray-500">Close</button>
                </form>
              </div>
            )}

            {/* ===== Emoji Modal ===== */}
            {showEmojiModal && (
              <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm animate-fadeIn">
                <div className="backdrop-blur-xl w-full max-w-[280px] rounded-[30px] p-6 shadow-2xl animate-slideUp bg-white/95 border border-gray-100">
                  <h3 className="text-[14px] font-black mb-1 text-[#ff96d3] text-center">เปลี่ยนอิโมจิ</h3>
                  <p className="text-[10px] text-gray-400 text-center mb-4">พิมพ์หรือวางอิโมจิที่ต้องการ</p>
                  <input
                    autoFocus
                    type="text"
                    value={tempEmoji}
                    onChange={e => setTempEmoji(e.target.value)}
                    placeholder="😊"
                    className="w-full p-3.5 rounded-2xl border border-gray-100 outline-none text-[28px] shadow-sm focus:border-[#ff96d3] text-center mb-5"
                  />
                  <div className="flex gap-2">
                    <button onClick={() => setShowEmojiModal(false)} className="flex-1 py-3.5 rounded-2xl font-black text-[11px] text-gray-500 bg-gray-100 active:scale-95 shadow-sm transition-all">ยกเลิก</button>
                    <button onClick={() => {
                      const chars = [...tempEmoji];
                      const emoji = chars.find(c => c.codePointAt(0) > 127) || tempEmoji.trim();
                      if (emoji) {
                        setNoteEmoji(emoji);
                        fetchAPI({action:'saveSetting', key:'noteEmoji', value:emoji});
                      }
                      setShowEmojiModal(false);
                    }} className="flex-[1.5] py-3.5 rounded-2xl font-black text-[11px] text-white bg-[#ff96d3] active:scale-95 shadow-sm transition-all">บันทึก</button>
                  </div>
                </div>
              </div>
            )}

          </div>

          <style>{`
            @keyframes border-dance { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
            .running-border { position: relative; border-radius: 22px; background: linear-gradient(90deg, #ff96d3, #ffe4ef, #ff96d3, #ffe4ef, #ff96d3); background-size: 300% 300%; animation: border-dance 3s linear infinite; padding: 2px; }
            .running-border-inner { background: #ffffff; border-radius: 20px; height: 100%; width: 100%; }
            .todo-scrollbar::-webkit-scrollbar { width: 4px; }
            .todo-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .todo-scrollbar::-webkit-scrollbar-thumb { background: #FFD2E4; border-radius: 10px; }
            @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(25px, -15px); } }
            @keyframes float-reverse { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-25px, 15px); } }
            @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes float-particle-1 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-20px); opacity: 0; } }
            @keyframes float-particle-2 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-15px) translateX(5px); opacity: 0; } }
            @keyframes float-particle-3 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-25px) translateX(-5px); opacity: 0; } }
            @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes text-wave { 0%, 20%, 100% { transform: translateY(0px); } 10% { transform: translateY(-5px); } }
            @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            .animate-text-wave { animation: text-wave 4s ease-in-out infinite; }
            .animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
            .animate-float-particle-1 { animation: float-particle-1 3s ease-out infinite; }
            .animate-float-particle-2 { animation: float-particle-2 4s ease-out infinite 1s; }
            .animate-float-particle-3 { animation: float-particle-3 3.5s ease-out infinite 0.5s; }
            .animate-float { animation: float 15s ease-in-out infinite; }
            .animate-float-reverse { animation: float-reverse 18s ease-in-out infinite; }
            .animate-slideUp { animation: slideUp 0.3s ease-out; }
            .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
            .animate-spin-slow { animation: spin-slow 1.2s linear infinite; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
