<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  
  <link rel="apple-touch-icon" href="https://em-content.zobj.net/source/apple/419/lemon_1f34b.png">
  <link rel="icon" sizes="192x192" href="https://em-content.zobj.net/source/apple/419/lemon_1f34b.png">
  <link rel="shortcut icon" href="https://em-content.zobj.net/source/apple/419/lemon_1f34b.png">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    // ==========================================
    // 🖼️ COMPONENTS: ไอคอน SVG
    // ==========================================
    const IconPlus = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconHome = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconSearch = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconClock = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconFileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconCalendar = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconLoader = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const IconTrash = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    
    const IconGlobe = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>;
    const IconNotion = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M8 16V8l8 8V8"></path></svg>;
    const IconDrive = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 10l-6 10l-3 -5l6 -10z"></path><path d="M9 15h12l-3 5h-12z"></path><path d="M15 15l-6 -10h6l6 10z"></path></svg>;

    const COLORS = {
      blue: '#CCE9ED', pink: '#FFD2E4', purple: '#FFEEB1', orange: '#E7F098', bg: '#fcfcfc', white: '#ffffff',
      textMain: '#ff96d3', textSoft: '#b5e48c', pinkDeep: '#ff96d3', blueDeep: '#b5e48c', purpleDeep: '#ff96d3', orangeDeep: '#b5e48c',
      cardBg: '#ffffff', cardBgDone: '#FFD2E4', cardWhite: '#ffffff', cardBorder: '#f0f0f0', cardInner: '#ffffff', cloudWhite: '#ffffff',
      modalBg: '#ffffff', navBarBg: '#ffffff', profileBorder: '#ff96d3', buttonBg: '#ffffff', dividerColor: '#f3f4f6',
    };

    const FluffyCloud = React.memo(({ top, left, right, bottom, scale = 1, opacity = 0.7, delay = '0s', reverse = false }) => (
      <div className="absolute pointer-events-none drop-shadow-sm z-0" style={{ top, left, right, bottom, opacity, transform: `scale(${scale})` }}>
        <div className={reverse ? 'animate-float-reverse' : 'animate-float'} style={{ animationDelay: delay }}>
          <div className="relative w-40 h-16">
            <div className="absolute bottom-0 left-4 w-32 h-10 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-2 left-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-5 left-10 w-16 h-16 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-1 right-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
          </div>
        </div>
      </div>
    ));

    const DynamicBackground = React.memo(() => (
      <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div className="absolute top-[10%] left-[-10%] w-72 h-72 rounded-full blur-[90px] opacity-40 animate-float" style={{ backgroundColor: COLORS.pink }}></div>
        <div className="absolute bottom-[10%] right-[-10%] w-80 h-80 rounded-full blur-[100px] opacity-30 animate-float-reverse" style={{ backgroundColor: COLORS.blue }}></div>
        <div className="absolute top-[40%] right-[10%] w-48 h-48 rounded-full blur-[80px] opacity-20 animate-float" style={{ backgroundColor: COLORS.purple }}></div>
        <FluffyCloud top="8%" left="-5%" scale={1.5} opacity={0.6} delay="0s" />
        <FluffyCloud bottom="20%" left="5%" scale={1.6} opacity={0.6} delay="3s" />
        <FluffyCloud top="50%" right="-5%" scale={1.8} opacity={0.5} delay="1s" reverse={true} />
      </div>
    ));

    const Header = React.memo(({ isAdmin, setIsAdmin, setShowAuthModal, handleImageUpload, profileImage }) => (
      <div className="px-5 pt-6 pb-2 relative z-10">
        <div className="backdrop-blur-md rounded-[32px] p-4 shadow-xl flex items-center justify-between h-20 relative overflow-hidden group" style={{ backgroundColor: `${COLORS.cardWhite}99`, borderWidth: '1px', borderColor: `${COLORS.cardBorder}80`, boxShadow: '0 10px 25px -5px rgba(255,210,228,0.2)' }}>
          <div className="absolute left-6 top-1/2 -translate-y-1/2 w-24 h-8 blur-xl rounded-full" style={{ backgroundColor: `${COLORS.pink}66` }}></div>
          <div className="flex flex-col justify-center ml-2 relative z-10">
            <div className="flex items-center gap-1">
             <h1 className="text-2xl font-black italic tracking-tighter flex">
             {"namtip".split('').map((char, index) => (
                <span key={index} className={`drop-shadow-sm inline-block animate-text-wave pb-2 ${char === ' ' ? 'w-2.5' : 'pr-[1.5px]'}`} style={{ animationDelay: `${index * 0.1}s`, color: '#ff96d3' }}>{char}</span>
              ))}
            </h1>
              <button onClick={() => isAdmin ? setIsAdmin(false) : setShowAuthModal(true)} className={`px-1.5 py-0.5 ml-1 rounded-full text-[7px] font-black uppercase tracking-widest border shadow-sm transition-all active:scale-95`} style={{ backgroundColor: isAdmin ? `${COLORS.buttonBg}99` : `${COLORS.buttonBg}cc`, color: isAdmin ? '#ff96d3' : '#9ca3af', borderColor: isAdmin ? '#FFD2E4' : '#e5e7eb' }}>{isAdmin ? 'Admin' : 'Guest'}</button>
            </div>
            <div className="flex items-center gap-1.5 opacity-70">
              <div className="w-3 h-[1px]" style={{ backgroundColor: COLORS.pinkDeep }}></div>
              <p className="text-[8px] font-black tracking-[0.5em] uppercase" style={{ color: COLORS.purpleDeep }}>Check Q</p>
            </div>
          </div>
          <div onClick={isAdmin ? handleImageUpload : undefined} className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center relative overflow-hidden transition-transform ${isAdmin ? 'cursor-pointer hover:scale-105 active:scale-95' : ''}`} style={{ backgroundColor: COLORS.cardInner, borderWidth: '2px', borderColor: COLORS.profileBorder }}>
            {profileImage ? <img src={profileImage} alt="Profile" className="w-full h-full object-cover" /> : <><div className="absolute inset-0 opacity-40" style={{ background: `linear-gradient(to top right, ${COLORS.pink}, ${COLORS.blue})` }}></div><span className="text-2xl relative z-10 select-none">🐰</span></>}
          </div>
        </div>
      </div>
    ));

    const ProgressFlower = React.memo(({ progress, todayTasksLength, doneToday, triggerFlowerBounce, isBouncing }) => {
      const bloomScale = Math.max(0.2, progress / 100);
      const isFullBloom = progress === 100 && todayTasksLength > 0;
      const petals = [0, 72, 144, 216, 288].map(angle => {
        const rad = (angle * Math.PI) / 180;
        return { cx: 50 + 15 * Math.sin(rad), cy: 50 - 15 * Math.cos(rad), r: 18 };
      });
      return (
        <div onClick={triggerFlowerBounce} className={`backdrop-blur-sm rounded-[28px] p-3 flex flex-col items-center justify-center shadow-lg h-full relative overflow-hidden transition-all duration-300 cursor-pointer ${isBouncing ? 'scale-95' : 'hover:scale-[1.02]'}`} style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder, boxShadow: '0 10px 15px -3px rgba(255,210,228,0.2)' }}>
          <div className="absolute top-2 left-3 text-[8px] font-black text-purpleDeep uppercase tracking-tighter opacity-70" style={{ color: COLORS.purpleDeep }}>ความสำเร็จวันนี้</div>
          <div className="relative w-full h-20 flex items-center justify-center mt-2">
            <svg viewBox="0 0 100 100" className="w-20 h-20 overflow-visible">
              <g transform="translate(50, 50)">
                  <g className="animate-breathe">
                    <g transform={`scale(${bloomScale})`} className="transition-transform duration-1000 cubic-bezier(0.34, 1.56, 0.64, 1)">
                      <g transform="translate(-50, -50)">
                        {petals.map((p, i) => <circle key={i} cx={p.cx} cy={p.cy} r={p.r} fill="#FFD2E4" opacity="0.95" className="transition-all duration-700"/>)}
                        <circle cx="50" cy="50" r="14" fill="#FFEEB1" />
                        {isFullBloom && (
                          <g transform="translate(50, 50)" className="animate-fade-in">
                            <path d="M -5 -1 Q -3 -3 -1 -1" fill="none" stroke="#ff96d3" strokeWidth="1.2" strokeLinecap="round" /><path d="M 1 -1 Q 3 -3 5 -1" fill="none" stroke="#ff96d3" strokeWidth="1.2" strokeLinecap="round" /><path d="M -1.5 2 Q 0 4 1.5 2" fill="none" stroke="#ff96d3" strokeWidth="1.2" strokeLinecap="round" />
                          </g>
                        )}
                      </g>
                    </g>
                  </g>
              </g>
            </svg>
          </div>
          <div className="mt-1 flex items-center gap-1 px-2 py-0.5 rounded-full z-10" style={{ backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '1px', borderColor: COLORS.pink }}>
            <span className="text-xs font-black" style={{ color: COLORS.purpleDeep }}>{progress}%</span>
            <div className="w-1 h-1 rounded-full bg-[#FFD2E4]"></div>
            <span className="text-[8px] font-bold text-gray-400 uppercase">{doneToday} / {todayTasksLength} งาน</span>
          </div>
        </div>
      );
    });

    const CompactStats = React.memo(({ isAdmin, selectedNextDate, nextQueueDate, handleSetManualDate, waitingCount }) => (
      <div className="backdrop-blur-sm rounded-[28px] p-1 shadow-lg h-full flex overflow-hidden relative group transition-all" style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder, boxShadow: '0 10px 15px -3px rgba(204,233,237,0.3)' }}>
          <div className={`flex-1 flex flex-col justify-center items-center p-2 relative rounded-l-[24px] transition-colors overflow-hidden ${isAdmin ? 'hover:bg-white/50 cursor-pointer' : ''}`} style={{ backgroundColor: `${COLORS.orange}66` }}>
            {isAdmin && <input type="date" className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10" value={selectedNextDate || nextQueueDate} onChange={(e) => handleSetManualDate(e.target.value)} />}
            <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-md text-[7px] font-black shadow-sm border uppercase tracking-wider whitespace-nowrap" style={{ color: COLORS.blueDeep, backgroundColor: COLORS.buttonBg, borderColor: COLORS.orange }}>NEXT QUEUE</div>
            <div className="flex flex-col items-center mt-1 relative z-0 pointer-events-none">
              <span className="text-3xl font-black leading-none tracking-tighter" style={{ color: COLORS.textSoft }}>{new Date(nextQueueDate).getDate()}</span>
              <span className="text-[8px] font-black opacity-80 uppercase mt-0.5" style={{ color: COLORS.blueDeep }}>{new Date(nextQueueDate).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</span>
            </div>
            {isAdmin && selectedNextDate && <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleSetManualDate(''); }} className="absolute bottom-1.5 left-1/2 -translate-x-1/2 z-20 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm border hover:bg-[#fff9f9] active:scale-90 transition-all" style={{ color: COLORS.pinkDeep, backgroundColor: COLORS.buttonBg, borderColor: COLORS.pink }}>AUTO</button>}
          </div>
          <div className="my-4 rounded-full" style={{ width: '1px', backgroundColor: `${COLORS.dividerColor}99` }}></div>
          <div className="flex-1 flex flex-col justify-center items-center p-2 relative">
            <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm border uppercase tracking-wider whitespace-nowrap z-10" style={{ color: COLORS.pinkDeep, backgroundColor: COLORS.buttonBg, borderColor: COLORS.pink }}>จำนวนคิวก่อนหน้า</div>
            <div className="relative mt-5 flex flex-col items-center">
               <div className="relative"><div className="absolute inset-0 blur-lg rounded-full opacity-40 scale-125" style={{ backgroundColor: COLORS.blue }}></div><div className="w-11 h-11 rounded-full flex flex-col items-center justify-center shadow-[inset_0_2px_8px_rgba(0,0,0,0.02)] relative z-10" style={{ backgroundColor: COLORS.cardInner, borderWidth: '2px', borderColor: COLORS.blue }}><span className="text-xl font-black leading-none" style={{ color: COLORS.pinkDeep }}>{waitingCount}</span></div></div>
               <span className="text-[8px] font-black opacity-60 uppercase mt-1.5 relative z-10" style={{ color: COLORS.pinkDeep }}>คิว</span>
            </div>
          </div>
      </div>
    ));

    const TaskCard = React.memo(({ task, isAdmin, onEdit, onToggleDoing, onToggleStatus }) => (
      <div onClick={() => isAdmin && onEdit(task)} className={`relative mb-2 rounded-[22px] p-3 transition-all shadow-sm group backdrop-blur-sm ${isAdmin ? 'active:scale-[0.97] cursor-pointer' : ''}`} style={{ backgroundColor: task.status === 'done' ? COLORS.cardBgDone : COLORS.cardBg, borderWidth: '1px', borderColor: task.status === 'doing' ? COLORS.pinkDeep : (task.status === 'done' ? 'transparent' : COLORS.cardBorder), opacity: task.status === 'done' ? 0.9 : 1 }}>
        <div className="absolute left-2 top-3 bottom-3 w-1 rounded-full" style={{ backgroundColor: task.channel === 'LINE' ? '#D5EDB5' : task.channel === 'FB' ? '#C0D5E9' : COLORS.pinkDeep }}></div>
        <div className="pl-3 pr-1 relative z-10">
          <div className="flex justify-between items-start mb-1">
            <div className="flex items-center gap-2 min-w-0"><span className="font-bold text-base truncate" style={{ color: task.status === 'done' ? '#ff96d3' : COLORS.textMain }}>{task.client}</span></div>
            <div className="flex items-center gap-1 text-[9px] font-black bg-[#fff9f9]/80 px-2.5 py-0.5 rounded-lg border shadow-sm" style={{ color: COLORS.pinkDeep, borderColor: COLORS.pink }}>{task.deadline ? task.deadline.substring(0, 10).split('-').reverse().join('/') : ''}</div>
          </div>
          <div className="flex justify-between items-end mt-1">
            <div className="flex-1 min-w-0 mr-4 flex flex-col gap-0.5 mt-1">
              <span className={`text-[11px] font-black truncate ${task.status === 'done' ? 'line-through text-[#ff96d3]/60' : ''}`} style={{ color: task.status === 'done' ? '' : COLORS.blueDeep }}>{task.type}</span>
              {task.time_period && <span className="text-[10px] flex items-center gap-1 mt-0.5 text-gray-500"><IconClock size={10} /> {task.time_period}</span>}
              {task.channel && <span className="text-[10px] truncate text-gray-500"><span className="font-bold">Link:</span> {task.channel}</span>}
            </div>
            {isAdmin ? (
              <div className="flex gap-1.5 shrink-0">
                <button onClick={(e) => onToggleDoing(e, task.id)} className="w-[28px] h-[28px] rounded-[8px] flex items-center justify-center border shadow-sm bg-white active:scale-90" style={{ color: task.status === 'doing' ? COLORS.orangeDeep : '#B0BEC5' }}><IconLoader size={14} className={task.status === 'doing' ? 'animate-spin-slow' : ''} /></button>
                <button onClick={(e) => onToggleStatus(e, task.id)} className="w-[28px] h-[28px] rounded-[8px] flex items-center justify-center border shadow-sm bg-white active:scale-90" style={{ color: task.status === 'done' ? COLORS.pinkDeep : '#B0BEC5' }}><IconCheck size={16} /></button>
              </div>
            ) : (
              <div className="flex items-center shrink-0">
                {task.status === 'doing' && <span className="text-[10px] font-bold flex items-center gap-1 px-2 py-1 rounded-md border" style={{ color: COLORS.blueDeep, backgroundColor: '#fff9f9', borderColor: COLORS.pink }}>กำลังทำ</span>}
                {task.status === 'done' && <span className="text-[10px] font-bold flex items-center gap-1 px-2 py-1 rounded-md border" style={{ color: COLORS.pinkDeep, backgroundColor: COLORS.white, borderColor: COLORS.pink }}>เสร็จแล้ว</span>}
                {task.status === 'todo' && <span className="text-[10px] font-bold text-gray-400 flex items-center gap-1 px-2 py-1 rounded-md border">รอคิว</span>}
              </div>
            )}
          </div>
        </div>
      </div>
    ));

    function App() {
      const [tasks, setTasks] = useState([]);
      const [taskTypes, setTaskTypes] = useState(['Logo', 'Banner', 'Artwork']);
      const [isLoading, setIsLoading] = useState(true);
      const [view, setView] = useState('dashboard');
      const [isAdmin, setIsAdmin] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [profileImage, setProfileImage] = useState(null);
      const [bannerImage, setBannerImage] = useState(null);
      const [isBannerVisible, setIsBannerVisible] = useState(true);
      const [selectedNextDate, setSelectedNextDate] = useState('');
      const [isBouncing, setIsBouncing] = useState(false);
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [password, setPassword] = useState('');

      // 🌟 1. ประกาศ State สำหรับเก็บลิงก์ทั้ง 3
      const [linkNotion, setLinkNotion] = useState('https://notion.so');
      const [linkWebsite, setLinkWebsite] = useState('https://google.com');
      const [linkDrive, setLinkDrive] = useState('https://drive.google.com');

      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwvj3YBpwPA6HuYgtkuZeRJp4cxvlprb4sXjxtMfbNBOdqmQxE2-FWYKulV3_809vK6/exec";

      const fetchAPI = async (payload) => {
        const res = await fetch(WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
        return await res.json();
      };

      useEffect(() => {
        fetch(WEB_APP_URL + "?action=getInitialData")
          .then(res => res.json())
          .then(response => {
            if (response.status === 'success') {
              setTasks(response.data.tasks || []);
              if (response.data.profileImage) setProfileImage(response.data.profileImage);
              if (response.data.bannerImage) setBannerImage(response.data.bannerImage);
              if (response.data.lockedNextDate) setSelectedNextDate(response.data.lockedNextDate);
              
              // 🌟 2. ดึงค่าลิงก์จากชีต (response.data) มาใส่ใน State
              if (response.data.linkNotion) setLinkNotion(response.data.linkNotion);
              if (response.data.linkWebsite) setLinkWebsite(response.data.linkWebsite);
              if (response.data.linkDrive) setLinkDrive(response.data.linkDrive);
            }
            setIsLoading(false);
          });
      }, []);

      const today = useMemo(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }, []);
      const todayTasks = useMemo(() => tasks.filter(t => t.deadline && t.deadline.substring(0, 10) === today), [tasks, today]);
      const doneToday = useMemo(() => todayTasks.filter(t => t.status === 'done').length, [todayTasks]);
      const progress = todayTasks.length === 0 ? 0 : Math.round((doneToday / todayTasks.length) * 100);

      const nextQueueDate = useMemo(() => {
        if (selectedNextDate) return selectedNextDate;
        let checkDate = new Date();
        for (let i = 0; i < 365; i++) {
          const ds = `${checkDate.getFullYear()}-${String(checkDate.getMonth() + 1).padStart(2, '0')}-${String(checkDate.getDate()).padStart(2, '0')}`;
          if (!tasks.some(t => t.deadline && t.deadline.substring(0, 10) === ds)) return ds;
          checkDate.setDate(checkDate.getDate() + 1);
        }
        return today;
      }, [tasks, selectedNextDate]);

      const waitingCount = useMemo(() => tasks.filter(t => t.status !== 'done').length, [tasks]);

      if (isLoading) return <div className="min-h-screen flex items-center justify-center" style={{ backgroundColor: COLORS.bg }}><DynamicBackground /><p className="z-10 font-black" style={{ color: COLORS.textMain }}>กำลังโหลด...</p></div>;

      return (
        <div className="min-h-screen font-sans relative" style={{ backgroundColor: COLORS.bg, color: COLORS.textMain }}>
          <DynamicBackground />
          <div className="max-w-md mx-auto min-h-screen relative pb-28">
            <Header isAdmin={isAdmin} setIsAdmin={setIsAdmin} setShowAuthModal={setShowAuthModal} profileImage={profileImage} />
            <div className="px-5 relative z-10 mb-4">
               {bannerImage && isBannerVisible && <div className="w-full h-32 rounded-[24px] overflow-hidden shadow-sm backdrop-blur-sm border border-white/50"><img src={bannerImage} className="w-full h-full object-cover" /></div>}
            </div>
            <div className="px-5 relative z-10">
              {view === 'dashboard' && (
                <div className="animate-fadeIn">
                  <div className="flex gap-3 mb-1.5 items-start">
                    <div className="flex-[1.6] h-28"><CompactStats isAdmin={isAdmin} nextQueueDate={nextQueueDate} waitingCount={waitingCount} handleSetManualDate={(d) => { setSelectedNextDate(d); fetchAPI({action:'saveLockedNextDate', dateStr: d}); }} /></div>
                    <div className="flex-1 flex flex-col gap-2">
                      <div className="h-28"><ProgressFlower progress={progress} todayTasksLength={todayTasks.length} doneToday={doneToday} triggerFlowerBounce={() => { setIsBouncing(true); setTimeout(()=>setIsBouncing(false), 500); }} isBouncing={isBouncing} /></div>
                      {/* 🌟 3. เปลี่ยนปุ่ม <a> ให้ใช้ตัวแปรจาก State */}
                      <div className="flex justify-between items-center backdrop-blur-sm rounded-[22px] px-3 py-2 shadow-sm bg-white/80 border border-white">
                        <a href={linkNotion} target="_blank" rel="noreferrer" className="p-1 text-[#B0BEC5] hover:text-[#ff96d3] active:scale-95"><IconNotion size={18} /></a>
                        <a href={linkWebsite} target="_blank" rel="noreferrer" className="p-1 text-[#B0BEC5] hover:text-[#ff96d3] active:scale-95"><IconGlobe size={18} /></a>
                        <a href={linkDrive} target="_blank" rel="noreferrer" className="p-1 text-[#B0BEC5] hover:text-[#ff96d3] active:scale-95"><IconDrive size={18} /></a>
                      </div>
                    </div>
                  </div>
                  <div className="flex items-center justify-between mb-2.5 ml-1"><h2 className="text-[10px] font-black text-gray-400 italic uppercase tracking-[0.3em] opacity-60">Today's Task</h2><div className="h-[1px] flex-1 bg-gradient-to-r from-[#FFD2E4]/60 to-transparent mx-3"></div></div>
                  <div className="space-y-1">{todayTasks.length > 0 ? todayTasks.map(t => <TaskCard key={t.id} task={t} isAdmin={isAdmin} onToggleStatus={(e, id) => { e.stopPropagation(); setTasks(prev => prev.map(item => item.id === id ? {...item, status: item.status === 'done' ? 'todo' : 'done'} : item)); fetchAPI({action:'updateTaskStatus', taskId: id, newStatus: tasks.find(i=>i.id===id).status==='done'?'todo':'done'}); }} />) : <div className="text-center py-10 rounded-[28px] border border-dashed border-[#ff96d3]/50 bg-white/30"><p className="text-[9px] font-bold uppercase tracking-widest text-[#ff96d3]">Sky is clear ✨</p></div>}</div>
                </div>
              )}
            </div>
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[210px] z-50">
              <div className="backdrop-blur-xl rounded-full h-14 flex items-center justify-between px-6 bg-white/60 border border-white/50 shadow-lg">
                  <button onClick={() => setView('dashboard')} style={{ color: view === 'dashboard' ? COLORS.pinkDeep : '#ccc' }}><IconHome size={22} /></button>
                  <div className="w-8"></div>
                  <button onClick={() => setView('all')} style={{ color: view === 'all' ? COLORS.blueDeep : '#ccc' }}><IconFileText size={22} /></button>
                  {isAdmin && <div className="absolute left-1/2 -translate-x-1/2 -top-6"><button onClick={() => setShowModal(true)} className="w-14 h-14 rounded-full text-white flex items-center justify-center shadow-xl bg-[#b5e48c] border-4 border-white"><IconPlus size={24} /></button></div>}
              </div>
            </div>
          </div>
          {showAuthModal && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/10 backdrop-blur-sm">
              <form onSubmit={(e) => { e.preventDefault(); fetchAPI({action: 'verifyAdminPassword', inputPassword: password}).then(res => { if(res.isValid){ setIsAdmin(true); setShowAuthModal(false); setPassword(''); }else{ alert('รหัสผ่านผิด'); } }); }} className="bg-white/95 rounded-[35px] p-6 shadow-2xl w-full max-w-xs text-center border border-white">
                <h3 className="text-sm font-black mb-4 text-[#ff96d3]">เข้าสู่ระบบ Admin</h3>
                <input type="password" value={password} onChange={(e)=>setPassword(e.target.value)} className="w-full p-3.5 rounded-2xl border border-gray-100 outline-none text-center text-[11px] mb-4" placeholder="รหัสผ่าน" />
                <button type="submit" className="w-full py-3 rounded-2xl bg-[#ff96d3] text-white font-black text-xs">Login</button>
                <button type="button" onClick={()=>setShowAuthModal(false)} className="mt-2 text-[9px] text-gray-400 font-bold uppercase tracking-widest">Close</button>
              </form>
            </div>
          )}
          <style>{`
            @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(25px, -15px); } }
            @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes text-wave { 0%, 20%, 100% { transform: translateY(0px); } 10% { transform: translateY(-5px); } }
            .animate-float { animation: float 15s ease-in-out infinite; }
            .animate-float-reverse { animation: float 18s ease-in-out infinite reverse; }
            .animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
            .animate-text-wave { animation: text-wave 4s ease-in-out infinite; }
            .animate-spin-slow { animation: spin 4s linear infinite; }
            @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
          `}</style>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
